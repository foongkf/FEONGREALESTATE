<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Feong Real Estate — Penang</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f0f2;
      color: #1d1d1f;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* 城市幻灯片背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -2;
      background-size: cover;
      background-position: center;
      animation: bgSlide 25s infinite;
      filter: grayscale(15%) brightness(1.05);
    }
    @keyframes bgSlide {
      0%   { background-image: url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=2000&q=80'); }
      25%  { background-image: url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=2000&q=80'); }
      50%  { background-image: url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=2000&q=80'); }
      75%  { background-image: url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=2000&q=80'); }
      100% { background-image: url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=2000&q=80'); }
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.4);
      z-index: -1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* 顶部品牌 */
    .floating-brand {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      padding: 8px 18px;
      border-radius: 40px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      border: 0.5px solid rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
      cursor: default;
    }
    .floating-brand:hover {
      background: white;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }
    .logo { font-size: 22px; opacity: 0.8; }
    .brand-text .name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.2px;
      color: #1d1d1f;
    }
    .brand-text .sub {
      font-size: 10px;
      color: #6e6e73;
    }

    /* 筛选栏 */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 48px;
      margin-top: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      padding: 16px 24px;
      border-radius: 60px;
      border: 0.5px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    }
    select, input {
      background: #ffffff;
      border: 1px solid #d2d2d7;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      color: #1d1d1f;
      outline: none;
      transition: all 0.2s;
      cursor: pointer;
    }
    select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }
    input {
      flex: 1;
      min-width: 180px;
      background-image: none;
    }
    select:focus, input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
    }

    /* Exclusive 横向滚动 - 修复卡片按钮贴底 */
    .exclusive-section {
      margin-bottom: 48px;
    }
    .exclusive-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #1d1d1f;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      margin-bottom: 20px;
      border: 0.5px solid rgba(0,0,0,0.05);
    }
    .horizontal-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 12px;
    }
    .horizontal-scroll::-webkit-scrollbar {
      height: 6px;
    }
    .horizontal-scroll::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
      border-radius: 10px;
    }
    .horizontal-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }
    .exclusive-grid {
      display: inline-flex;
      gap: 20px;
      white-space: normal;
      align-items: stretch;
    }
    /* 关键修复：独占区卡片使用 flex 布局，不覆盖全局 .card 的 display */
    .exclusive-grid .card {
      width: 280px;
      min-height: 140px;
      flex-shrink: 0;
      height: 100%;
      /* 继承 .card 的 flex 列布局，不再设置 display: inline-block */
    }

    /* 普通网格 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    /* 卡片通用样式 - flex 列布局，按钮自动贴底 */
    .card {
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      border: 0.5px solid #e8e8ed;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.1);
    }
    .gold-card {
      background: #fffef7;
      border-left: 3px solid #f5a623;
    }

    .img-box {
      position: relative;
      height: 160px;
      background-color: #f5f5f7;
      overflow: hidden;
      flex-shrink: 0;
    }
    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .card:hover .img-box img {
      transform: scale(1.02);
    }
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: 9px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      z-index: 2;
    }
    .tag {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
      backdrop-filter: blur(4px);
      background: rgba(0,0,0,0.75);
      color: white;
      z-index: 2;
    }
    .tag.sale { background: rgba(230, 60, 60, 0.9); }
    .tag.rent { background: rgba(0, 113, 227, 0.9); }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 400;
      color: #1d1d1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 3;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .nav:hover { background: white; }
    .prev { left: 8px; }
    .next { right: 8px; }
    .image-counter {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 12px;
      z-index: 2;
    }

    /* 内容区域 */
    .content {
      padding: 14px 14px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 140px;
    }
    .content h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 6px;
      color: #1d1d1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .price {
      font-size: 18px;
      font-weight: 600;
      color: #1d1d1f;
      margin: 6px 0 8px;
    }
    .info {
      font-size: 11px;
      color: #6e6e73;
      margin-bottom: 6px;
    }
    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
      min-height: 48px;
    }
    .detail-tag {
      background: #f5f5f7;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      color: #1d1d1f;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      letter-spacing: -0.2px;
    }

    /* 按钮容器 - 自动贴底 */
    .card-buttons {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding: 0 14px 14px 14px;
    }
    .btn, .btn-outline {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 12px;
      font-weight: 500;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn {
      background: #1d1d1f;
      color: white;
    }
    .btn:hover {
      background: #000;
      transform: scale(0.97);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #d2d2d7;
      color: #1d1d1f;
    }
    .btn-outline:hover {
      background: #f5f5f7;
      border-color: #1d1d1f;
    }

    /* 分页控件 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .pagination button {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(0,0,0,0.05);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .pagination button:hover:not(:disabled) {
      background: white;
      transform: scale(0.96);
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-numbers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .page-numbers span {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.1s;
      border: 0.5px solid rgba(0,0,0,0.05);
    }
    .page-numbers span.active {
      background: #1d1d1f;
      color: white;
      border: none;
    }
    .page-numbers span:hover:not(.active) {
      background: white;
    }

    footer {
      text-align: center;
      padding: 24px 20px;
      margin-top: 40px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-top: 0.5px solid rgba(0,0,0,0.05);
      color: #6e6e73;
      font-size: 12px;
    }

    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-content {
      max-width: 700px;
      width: 100%;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      animation: modalFadeIn 0.2s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-img-box {
      position: relative;
      height: 320px;
      background: #f5f5f7;
    }
    .modal-img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .modal-nav:hover {
      background: white;
    }
    .modal-prev { left: 16px; }
    .modal-next { right: 16px; }
    .modal-counter {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
      z-index: 10;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: none;
      color: white;
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: 0.2s;
    }
    .modal-close:hover {
      background: rgba(0,0,0,0.8);
    }
    .modal-details {
      padding: 24px;
    }
    .modal-details h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal-price {
      font-size: 28px;
      font-weight: 700;
      color: #1d1d1f;
      margin: 12px 0 8px;
    }
    .modal-area {
      font-size: 16px;
      color: #6e6e73;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    .modal-tag {
      background: #f5f5f7;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
    }
    .modal-wa-btn {
      display: block;
      background: #25D366;
      color: white;
      text-align: center;
      padding: 14px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 20px;
      transition: 0.2s;
    }
    .modal-wa-btn:hover {
      background: #1ebe5d;
      transform: scale(0.98);
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .container {
        padding: 1.2rem 1rem;
      }
      .filters {
        margin-top: 60px;
        margin-bottom: 32px;
        padding: 12px 18px;
      }
      .exclusive-grid .card {
        width: 260px;
        height: 100%;
      }
      .grid {
        gap: 14px;
      }
      .pagination button, .page-numbers span {
        padding: 6px 12px;
        font-size: 12px;
      }
      .detail-tag {
        font-size: 9px;
        padding: 3px 8px;
      }
      .modal-img-box {
        height: 250px;
      }
      .modal-details h2 {
        font-size: 20px;
      }
      .modal-price {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="floating-brand">
  <div class="logo">🏙️</div>
  <div class="brand-text">
    <div class="name">FEONG REAL ESTATE</div>
    <div class="sub">Penang Property Listing</div>
  </div>
</div>

<div class="container">
  <div class="filters">
    <select id="type">
      <option value="all">All</option>
      <option value="sale">For Sale</option>
      <option value="rent">For Rent</option>
    </select>
    <select id="area"><option value="all">Area</option></select>
    <select id="sort">
      <option value="default">Default</option>
      <option value="exclusive">Exclusive First</option>
      <option value="low">Price Low → High</option>
      <option value="high">Price High → Low</option>
    </select>
    <input id="search" placeholder="Search by property name..." />
  </div>

  <div class="exclusive-section">
    <div class="exclusive-title">⭐ Exclusive Listings</div>
    <div class="horizontal-scroll">
      <div class="exclusive-grid" id="exclusiveGrid"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="pagination" id="pagination"></div>
</div>
<footer>FEONG: 014-7405020 | REN 61687 | Today Properties</footer>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <div class="modal-img-box">
      <img id="modalImage" src="" alt="Property image">
      <button class="modal-nav modal-prev" id="modalPrev">‹</button>
      <button class="modal-nav modal-next" id="modalNext">›</button>
      <div class="modal-counter" id="modalCounter">1/1</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-details">
      <h2 id="modalTitle"></h2>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-area" id="modalArea"></div>
      <div class="modal-tags" id="modalTags"></div>
      <a href="#" id="modalWALink" class="modal-wa-btn" target="_blank">📲 Contact via WhatsApp</a>
    </div>
  </div>
</div>

<script>
// 工具函数
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function formatImgUrl(url) {
  if (!url) return '';
  if (url.includes('drive.google.com')) {
    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
    const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (idMatch) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w800`;
  }
  return url;
}

function parseImages(raw) {
  if (!raw) return ['https://placehold.co/800x500/f5f5f7/86868b?text=No+Image'];
  return raw.split('|').map(s => s.trim()).filter(Boolean).map(formatImgUrl);
}

function getPriceNumber(priceStr) {
  if (!priceStr) return 0;
  const num = parseFloat(priceStr.replace(/[^0-9.]/g, ''));
  return isNaN(num) ? 0 : num;
}

function buildWALink(property) {
  const msg = `Hi, I’m interested in this property:\n🏠 ${property.title}\n📍 ${property.area}\n💰 ${property.price}\n📐 ${property.size} sqft\n🛏 ${property.bedroom} bed\n🚿 ${property.bathroom} bath\n🚗 ${property.parking} park\n🛠 ${property.renovate} reno\n🪑 ${property.furnish} furnish\n📜 ${property.tenure}\n\nPlease give me more details.`;
  return `https://wa.me/60147405020?text=${encodeURIComponent(msg)}`;
}

function getSampleProperties() {
  return [
    { id: 1, title: "The Maritime Suite", area: "Gurney Drive", size: "1250", bedroom: "3", bathroom: "2", renovate: "Fully", furnish: "Partly", parking: "2", tenure: "freehold", type: "sale", price: "RM 1,250,000", exclusive: true, imagesRaw: "https://placehold.co/800x500/0071e3/white?text=Maritime|https://placehold.co/800x500/f5a623/white?text=Maritime+2" },
    { id: 2, title: "Quayside Residence", area: "Tanjung Tokong", size: "980", bedroom: "2", bathroom: "2", renovate: "Partly", furnish: "Fully", parking: "1", tenure: "freehold", type: "sale", price: "RM 890,000", exclusive: false, imagesRaw: "https://placehold.co/800x500/34c759/white?text=Quayside" },

let allProperties = [];
let imgIndex = {};
let currentPage = 1;
const ITEMS_PER_PAGE = 12;
let currentModalProperty = null;
let currentModalImageIndex = 0;

function parseCSVRow(line, expectedCols = 13) {
  const result = [];
  let inQuote = false;
  let current = '';
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  if (result.length > expectedCols) {
    let pricePart = result.slice(10, result.length - 2).join(',');
    let newRow = [...result.slice(0,10), pricePart, ...result.slice(-2)];
    return newRow;
  }
  while(result.length < expectedCols) result.push('');
  return result;
}

function buildPropertiesFromCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const properties = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVRow(lines[i], 13);
    if (cols.length < 10 || !cols[0]) continue;
    const prop = {
      id: i,
      title: escapeHtml(cols[0] || ''),
      area: escapeHtml(cols[1] || ''),
      size: escapeHtml(cols[2] || ''),
      bedroom: escapeHtml(cols[3] || ''),
      bathroom: escapeHtml(cols[4] || ''),
      renovate: escapeHtml(cols[5] || ''),
      furnish: escapeHtml(cols[6] || ''),
      parking: escapeHtml(cols[7] || ''),
      tenure: escapeHtml(cols[8] || '').toLowerCase(),
      type: (cols[9] || '').toLowerCase(),
      price: escapeHtml(cols[10] || ''),
      exclusive: (cols[11] || '').toLowerCase() === 'yes',
      imagesRaw: cols[12] || ''
    };
    prop.images = parseImages(prop.imagesRaw);
    prop.priceNum = getPriceNumber(prop.price);
    properties.push(prop);
  }
  return properties;
}

async function loadData() {
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";
  try {
    console.log("Loading real data...");
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const csvText = await resp.text();
    const properties = buildPropertiesFromCSV(csvText);
    if (properties.length === 0) throw new Error("No valid rows");
    allProperties = properties;
    console.log(`Loaded ${allProperties.length} real properties.`);
  } catch (err) {
    console.warn("Using sample data", err);
    allProperties = getSampleProperties();
    allProperties.forEach(p => {
      p.images = parseImages(p.imagesRaw);
      p.priceNum = getPriceNumber(p.price);
    });
  }
  allProperties.forEach(p => { imgIndex[p.id] = 0; });
  populateAreaFilter();
  currentPage = 1;
  renderExclusive();
  renderNormalPaged();
}

function populateAreaFilter() {
  const areas = [...new Set(allProperties.map(p => p.area).filter(a => a))];
  const areaSelect = document.getElementById('area');
  areaSelect.innerHTML = '<option value="all">Area</option>' + areas.map(a => `<option value="${a}">${a}</option>`).join('');
}

function getFilteredNormalProps() {
  const typeVal = document.getElementById('type').value;
  const areaVal = document.getElementById('area').value;
  const searchVal = document.getElementById('search').value.trim().toLowerCase();
  const sortVal = document.getElementById('sort').value;

  let filtered = allProperties.filter(p => {
    if (typeVal !== 'all' && !p.type.includes(typeVal)) return false;
    if (areaVal !== 'all' && p.area !== areaVal) return false;
    if (searchVal && !p.title.toLowerCase().includes(searchVal)) return false;
    return true;
  });
  let normalProps = filtered.filter(p => !p.exclusive);
  const applySort = (list) => {
    if (sortVal === 'low') return [...list].sort((a,b) => a.priceNum - b.priceNum);
    if (sortVal === 'high') return [...list].sort((a,b) => b.priceNum - a.priceNum);
    return list;
  };
  normalProps = applySort(normalProps);
  return normalProps;
}

function getFilteredExclusiveProps() {
  const typeVal = document.getElementById('type').value;
  const areaVal = document.getElementById('area').value;
  const searchVal = document.getElementById('search').value.trim().toLowerCase();
  const sortVal = document.getElementById('sort').value;

  let filtered = allProperties.filter(p => {
    if (typeVal !== 'all' && !p.type.includes(typeVal)) return false;
    if (areaVal !== 'all' && p.area !== areaVal) return false;
    if (searchVal && !p.title.toLowerCase().includes(searchVal)) return false;
    return true;
  });
  let exclusiveProps = filtered.filter(p => p.exclusive);
  const applySort = (list) => {
    if (sortVal === 'low') return [...list].sort((a,b) => a.priceNum - b.priceNum);
    if (sortVal === 'high') return [...list].sort((a,b) => b.priceNum - a.priceNum);
    return list;
  };
  exclusiveProps = applySort(exclusiveProps);
  return exclusiveProps;
}

function renderExclusive() {
  const exclusiveProps = getFilteredExclusiveProps();
  const container = document.getElementById('exclusiveGrid');
  container.innerHTML = exclusiveProps.map(p => renderCard(p, true)).join('');
}

function renderNormalPaged() {
  const normalProps = getFilteredNormalProps();
  const totalPages = Math.ceil(normalProps.length / ITEMS_PER_PAGE);
  if (totalPages > 0 && currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = normalProps.slice(start, start + ITEMS_PER_PAGE);
  const grid = document.getElementById('grid');
  grid.innerHTML = pageItems.map(p => renderCard(p, false)).join('');
  renderPaginationControls(totalPages);
}

function renderPaginationControls(totalPages) {
  const paginationDiv = document.getElementById('pagination');
  if (totalPages <= 1) {
    paginationDiv.innerHTML = '';
    return;
  }
  let html = `<button class="prev-page" ${currentPage === 1 ? 'disabled' : ''}>‹ Previous</button>`;
  html += `<div class="page-numbers">`;
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);
  if (startPage > 1) {
    html += `<span data-page="1">1</span>`;
    if (startPage > 2) html += `<span>...</span>`;
  }
  for (let i = startPage; i <= endPage; i++) {
    html += `<span data-page="${i}" class="${i === currentPage ? 'active' : ''}">${i}</span>`;
  }
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span>...</span>`;
    html += `<span data-page="${totalPages}">${totalPages}</span>`;
  }
  html += `</div><button class="next-page" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
  paginationDiv.innerHTML = html;

  paginationDiv.querySelectorAll('.page-numbers span[data-page]').forEach(span => {
    span.addEventListener('click', () => {
      const page = parseInt(span.dataset.page);
      if (!isNaN(page) && page !== currentPage) {
        currentPage = page;
        renderNormalPaged();
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
  const prevBtn = paginationDiv.querySelector('.prev-page');
  const nextBtn = paginationDiv.querySelector('.next-page');
  if (prevBtn && !prevBtn.disabled) prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderNormalPaged(); document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' }); } });
  if (nextBtn && !nextBtn.disabled) nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderNormalPaged(); document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' }); } });
}

function renderCard(p, isGold) {
  const images = p.images;
  const currentIdx = imgIndex[p.id] || 0;
  const currentImg = images[currentIdx] || images[0];
  const totalImgs = images.length;
  const showNav = totalImgs > 1;
  const typeTag = p.type.includes('rent') ? 'rent' : 'sale';
  const tagLabel = typeTag === 'rent' ? 'RENT' : 'SALE';

  const tags = [];
  if (p.size) tags.push(`📐 ${p.size} sqft`);
  if (p.bedroom) tags.push(`🛏 ${p.bedroom} bed`);
  if (p.bathroom) tags.push(`🚿 ${p.bathroom} bath`);
  if (p.parking) tags.push(`🚗 ${p.parking} park`);
  if (p.renovate) tags.push(`🛠 ${p.renovate} reno`);
  if (p.furnish) tags.push(`🪑 ${p.furnish} furnish`);
  if (p.tenure) tags.push(`📜 ${p.tenure}`);
  const tagsHtml = tags.map(t => `<span class="detail-tag">${t}</span>`).join('');

  return `
    <div class="card ${p.exclusive ? 'gold-card' : ''}" data-id="${p.id}">
      <div class="img-box">
        ${p.exclusive ? '<div class="badge">⭐ EXCLUSIVE</div>' : ''}
        <div class="tag ${typeTag}">${tagLabel}</div>
        <img id="img${p.id}" src="${currentImg}" onerror="this.src='https://placehold.co/600x400/f5f5f7/86868b?text=Error'">
        ${showNav ? `<button class="nav prev" onclick="event.stopPropagation(); changeImage(${p.id}, -1)">‹</button>
                      <button class="nav next" onclick="event.stopPropagation(); changeImage(${p.id}, 1)">›</button>` : ''}
        <div class="image-counter">${currentIdx+1}/${totalImgs}</div>
      </div>
      <div class="content">
        <h3>${p.title}</h3>
        <div class="price">${p.price}</div>
        <div class="info">📍 ${p.area}</div>
        <div class="detail-tags">${tagsHtml}</div>
      </div>
      <div class="card-buttons">
        <a class="btn" href="${buildWALink(p)}" target="_blank" onclick="event.stopPropagation();">WhatsApp</a>
        <button class="btn-outline" onclick="event.stopPropagation(); openDetailModal(${p.id})">View Details</button>
      </div>
    </div>
  `;
}

window.changeImage = function(propId, delta) {
  const prop = allProperties.find(p => p.id === propId);
  if (!prop || !prop.images.length) return;
  let newIdx = (imgIndex[propId] || 0) + delta;
  if (newIdx < 0) newIdx = prop.images.length - 1;
  if (newIdx >= prop.images.length) newIdx = 0;
  imgIndex[propId] = newIdx;
  const imgElem = document.getElementById(`img${propId}`);
  if (imgElem) imgElem.src = prop.images[newIdx];
  const counterDiv = imgElem?.parentElement?.querySelector('.image-counter');
  if (counterDiv) counterDiv.innerText = `${newIdx+1}/${prop.images.length}`;
};

function openDetailModal(propertyId) {
  const prop = allProperties.find(p => p.id === propertyId);
  if (!prop) return;
  currentModalProperty = prop;
  currentModalImageIndex = 0;
  updateModalContent();
  document.getElementById('detailModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function updateModalContent() {
  if (!currentModalProperty) return;
  const images = currentModalProperty.images;
  const currentImg = images[currentModalImageIndex] || images[0];
  document.getElementById('modalImage').src = currentImg;
  document.getElementById('modalCounter').innerText = `${currentModalImageIndex+1}/${images.length}`;
  document.getElementById('modalTitle').innerText = currentModalProperty.title;
  document.getElementById('modalPrice').innerText = currentModalProperty.price;
  document.getElementById('modalArea').innerHTML = `📍 ${currentModalProperty.area}`;
  
  const tags = [];
  if (currentModalProperty.size) tags.push(`📐 ${currentModalProperty.size} sqft`);
  if (currentModalProperty.bedroom) tags.push(`🛏 ${currentModalProperty.bedroom} bed`);
  if (currentModalProperty.bathroom) tags.push(`🚿 ${currentModalProperty.bathroom} bath`);
  if (currentModalProperty.parking) tags.push(`🚗 ${currentModalProperty.parking} park`);
  if (currentModalProperty.renovate) tags.push(`🛠 ${currentModalProperty.renovate} reno`);
  if (currentModalProperty.furnish) tags.push(`🪑 ${currentModalProperty.furnish} furnish`);
  if (currentModalProperty.tenure) tags.push(`📜 ${currentModalProperty.tenure}`);
  document.getElementById('modalTags').innerHTML = tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
  
  const waLink = buildWALink(currentModalProperty);
  document.getElementById('modalWALink').href = waLink;
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
  document.body.style.overflow = '';
}

function nextModalImage() {
  if (!currentModalProperty) return;
  if (currentModalImageIndex + 1 < currentModalProperty.images.length) {
    currentModalImageIndex++;
    updateModalContent();
  }
}

function prevModalImage() {
  if (!currentModalProperty) return;
  if (currentModalImageIndex - 1 >= 0) {
    currentModalImageIndex--;
    updateModalContent();
  }
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalPrev').addEventListener('click', prevModalImage);
document.getElementById('modalNext').addEventListener('click', nextModalImage);
window.addEventListener('click', (e) => {
  const modal = document.getElementById('detailModal');
  if (e.target === modal) closeModal();
});

function onFilterChange() {
  currentPage = 1;
  renderExclusive();
  renderNormalPaged();
}
document.querySelectorAll('#type, #area, #sort, #search').forEach(el => el.addEventListener('input', onFilterChange));

loadData();
</script>
