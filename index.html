<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Estate Google Sheets Pro Lite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f7}
.container{max-width:1200px;margin:auto;padding:20px}

.filters{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
input,select{padding:8px;border-radius:10px;border:1px solid #ddd}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}

.card{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,.08)
}

.card img{width:100%;height:160px;object-fit:cover}
.content{padding:10px}
.price{font-weight:bold;margin-top:5px}

.btns{display:flex;gap:6px;padding:10px}
button{flex:1;padding:6px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#0071e3;color:#fff}
.fav{width:40px}

.modal{
  position:fixed;inset:0;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);
}
.modal-content{
  background:#fff;padding:20px;border-radius:14px;width:90%;max-width:500px;
}
</style>
</head>

<body>

<div class="container">

<div class="filters">
  <select id="type">
    <option value="all">All</option>
    <option value="sale">Sale</option>
    <option value="rent">Rent</option>
  </select>

  <input id="search" placeholder="Search...">
</div>

<div class="grid" id="grid"></div>

</div>

<!-- modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="mTitle"></h2>
    <p id="mPrice"></p>
    <p id="mArea"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* ================= CONFIG ================= */
/* 🔥 你只需要改这个 */
const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";

/* ================= STATE ================= */
let properties = [];
let filtered = [];

/* ================= FETCH GOOGLE SHEET ================= */
async function loadData(){
  const res = await fetch(SHEET_CSV_URL);
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  properties = rows.map(r=>{
    const cols = r.split(",");

    return {
      id: cols[0],
      title: cols[1],
      price: cols[2],
      area: cols[3],
      type: cols[4],
      image: convertDrive(cols[5])
    };
  });

  filtered = [...properties];
  render();
}

/* ================= GOOGLE DRIVE FIX ================= */
function convertDrive(url){
  if(!url) return "";

  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
  }

  return url;
}

/* ================= RENDER ================= */
function render(){
  const grid = document.getElementById("grid");

  grid.innerHTML = filtered.map(p=>`
    <div class="card">
      <img src="${p.image}">
      <div class="content">
        <div>${p.title}</div>
        <div class="price">RM ${p.price}</div>
        <div>${p.area}</div>
      </div>
      <div class="btns">
        <button class="primary" onclick="openModal('${p.id}')">View</button>
        <button onclick="wa('${p.title}','${p.price}')">WA</button>
      </div>
    </div>
  `).join("");
}

/* ================= FILTER ================= */
function applyFilter(){
  const type = document.getElementById("type").value;
  const search = document.getElementById("search").value.toLowerCase();

  filtered = properties.filter(p=>{
    return (type==="all"||p.type===type)
    && p.title.toLowerCase().includes(search);
  });

  render();
}

document.getElementById("type").onchange = applyFilter;
document.getElementById("search").oninput = applyFilter;

/* ================= MODAL ================= */
function openModal(id){
  const p = properties.find(x=>x.id===id);

  document.getElementById("mTitle").innerText = p.title;
  document.getElementById("mPrice").innerText = "RM "+p.price;
  document.getElementById("mArea").innerText = p.area;

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ================= WHATSAPP ================= */
function wa(title,price){
  const msg = encodeURIComponent(`Interested: ${title} RM ${price}`);
  window.open(`https://wa.me/60147405020?text=${msg}`);
}

/* ================= INIT ================= */
loadData();

</script>

</body>
</html>
