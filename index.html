<script>
// ======================= 工具函数 =======================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function formatImgUrl(url) {
  if (!url) return '';
  if (url.includes('drive.google.com')) {
    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`;
    const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (idMatch) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w600`;
  }
  return url;
}

function parseImages(raw) {
  if (!raw) return ['https://placehold.co/600x400/f5f5f7/86868b?text=No+Image'];
  return raw.split('|').map(s => s.trim()).filter(Boolean).map(formatImgUrl);
}

function getPriceNumber(priceStr) {
  if (!priceStr) return 0;
  const num = parseFloat(priceStr.replace(/[^0-9.]/g, ''));
  return isNaN(num) ? 0 : num;
}

  return `https://wa.me/60147405020?text=${encodeURIComponent(msg)}`;
}

// ======================= 全局变量 =======================
let allProperties = [];
let imgIndex = {};
let currentPage = 1;
const ITEMS_PER_PAGE = 12;

// ======================= 解析 CSV（从真实表格） =======================
function parseCSVRow(line, expectedCols = 13) {
  const result = [];
  let inQuote = false;
  let current = '';
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  if (result.length > expectedCols) {
    let pricePart = result.slice(10, result.length - 2).join(',');
    let newRow = [...result.slice(0,10), pricePart, ...result.slice(-2)];
    return newRow;
  }
  while(result.length < expectedCols) result.push('');
  return result;
}

// 从 CSV 文本构建 property 数组
function buildPropertiesFromCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const properties = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVRow(lines[i], 13);
    if (cols.length < 10 || !cols[0]) continue;
    const prop = {
      id: i,
      title: escapeHtml(cols[0] || ''),
      area: escapeHtml(cols[1] || ''),
      size: escapeHtml(cols[2] || ''),
      bedroom: escapeHtml(cols[3] || ''),
      bathroom: escapeHtml(cols[4] || ''),
      renovate: escapeHtml(cols[5] || ''),
      furnish: escapeHtml(cols[6] || ''),
      parking: escapeHtml(cols[7] || ''),
      tenure: escapeHtml(cols[8] || '').toLowerCase(),
      type: (cols[9] || '').toLowerCase(),
      price: escapeHtml(cols[10] || ''),
      exclusive: (cols[11] || '').toLowerCase() === 'yes',
      imagesRaw: cols[12] || ''
    };
    prop.images = parseImages(prop.imagesRaw);
    prop.priceNum = getPriceNumber(prop.price);
    properties.push(prop);
  }
  return properties;
}

// ======================= 数据加载（真实表格优先，失败则 fallback 示例） =======================
async function loadData() {
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";
  try {
    console.log("Attempting to load real data from Google Sheets...");
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const csvText = await resp.text();
    const properties = buildPropertiesFromCSV(csvText);
    if (properties.length === 0) throw new Error("CSV parsed but no valid rows");
    allProperties = properties;
    usingSampleData = false;
    console.log(`Successfully loaded ${allProperties.length} properties from Google Sheets.`);
  } catch (err) {
    console.warn("Failed to load real data, using sample data instead.", err);
    allProperties = getSampleProperties();
    usingSampleData = true;
    // 补全图片解析和价格数字
    allProperties.forEach(p => {
      p.images = parseImages(p.imagesRaw);
      p.priceNum = getPriceNumber(p.price);
    });
    console.log(`Using ${allProperties.length} sample properties.`);
  }
  
  // 初始化图片索引
  allProperties.forEach(p => { imgIndex[p.id] = 0; });
  populateAreaFilter();
  // 重置分页和筛选
  currentPage = 1;
  renderExclusive();
  renderNormalPaged();
}

  const typeVal = document.getElementById('type').value;

  const sortVal = document.getElementById('sort').value;

  let filtered = allProperties.filter(p => {
    if (typeVal !== 'all' && !p.type.includes(typeVal)) return false;
    if (areaVal !== 'all' && p.area !== areaVal) return false;
    if (searchVal && !p.title.toLowerCase().includes(searchVal)) return false;
    return true;
  });

  let normalProps = filtered.filter(p => !p.exclusive);
  const applySort = (list) => {
    if (sortVal === 'low') return [...list].sort((a,b) => a.priceNum - b.priceNum);
    if (sortVal === 'high') return [...list].sort((a,b) => b.priceNum - a.priceNum);
    return list;
  };
  normalProps = applySort(normalProps);
  return normalProps;
}

// 获取筛选排序后的独占房源（全部显示，不分页）
function getFilteredExclusiveProps() {
  const typeVal = document.getElementById('type').value;
  const areaVal = document.getElementById('area').value;
  const searchVal = document.getElementById('search').value.trim().toLowerCase();
  const sortVal = document.getElementById('sort').value;

  let filtered = allProperties.filter(p => {
    if (typeVal !== 'all' && !p.type.includes(typeVal)) return false;
    if (areaVal !== 'all' && p.area !== areaVal) return false;
    if (searchVal && !p.title.toLowerCase().includes(searchVal)) return false;
    return true;
  });
  let exclusiveProps = filtered.filter(p => p.exclusive);
  const applySort = (list) => {
    if (sortVal === 'low') return [...list].sort((a,b) => a.priceNum - b.priceNum);
    if (sortVal === 'high') return [...list].sort((a,b) => b.priceNum - a.priceNum);
    return list;
  };
  exclusiveProps = applySort(exclusiveProps);
  return exclusiveProps;
}

// 渲染独占区（始终全部）
function renderExclusive() {
  const exclusiveProps = getFilteredExclusiveProps();
  const exclusiveContainer = document.getElementById('exclusiveGrid');
  exclusiveContainer.innerHTML = exclusiveProps.map(p => renderCard(p, true)).join('');
}

// 渲染普通区分页
function renderNormalPaged() {
  const normalProps = getFilteredNormalProps();
  const totalPages = Math.ceil(normalProps.length / ITEMS_PER_PAGE);
  if (totalPages > 0 && currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = normalProps.slice(start, start + ITEMS_PER_PAGE);
  
  const gridContainer = document.getElementById('grid');
  gridContainer.innerHTML = pageItems.map(p => renderCard(p, false)).join('');
  
  renderPaginationControls(totalPages);
}

// 渲染分页控件
function renderPaginationControls(totalPages) {
  const paginationDiv = document.getElementById('pagination');
  if (totalPages <= 1) {
    paginationDiv.innerHTML = '';
    return;
  }
  
  let html = `<button class="prev-page" ${currentPage === 1 ? 'disabled' : ''}>‹ Previous</button>`;
  html += `<div class="page-numbers">`;
  
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);
  if (startPage > 1) {
    html += `<span data-page="1">1</span>`;
    if (startPage > 2) html += `<span>...</span>`;
  }
  for (let i = startPage; i <= endPage; i++) {
    html += `<span data-page="${i}" class="${i === currentPage ? 'active' : ''}">${i}</span>`;
  }
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span>...</span>`;
    html += `<span data-page="${totalPages}">${totalPages}</span>`;
  }
  html += `</div>`;
  html += `<button class="next-page" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
  
  paginationDiv.innerHTML = html;
  
  paginationDiv.querySelectorAll('.page-numbers span[data-page]').forEach(span => {
    span.addEventListener('click', () => {
      const page = parseInt(span.dataset.page);
      if (!isNaN(page) && page !== currentPage) {
        currentPage = page;
        renderNormalPaged();
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
  const prevBtn = paginationDiv.querySelector('.prev-page');
  const nextBtn = paginationDiv.querySelector('.next-page');
  if (prevBtn && !prevBtn.disabled) {
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderNormalPaged();
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }
  if (nextBtn && !nextBtn.disabled) {
    nextBtn.addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderNormalPaged();
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }
}

// 渲染卡片（公用）
function renderCard(p, isGold) {
  const images = p.images;
  const currentIdx = imgIndex[p.id] || 0;
  const currentImg = images[currentIdx] || images[0];
  const totalImgs = images.length;
  const showNav = totalImgs > 1;
  const typeTag = p.type.includes('rent') ? 'rent' : 'sale';
  const tagLabel = typeTag === 'rent' ? 'RENT' : 'SALE';

  return `
    <div class="card ${p.exclusive ? 'gold-card' : ''}">
      <div class="img-box">
        ${p.exclusive ? '<div class="badge">⭐ EXCLUSIVE</div>' : ''}
        <div class="tag ${typeTag}">${tagLabel}</div>
        <img id="img${p.id}" src="${currentImg}" onerror="this.src='https://placehold.co/600x400/f5f5f7/86868b?text=Image+Error'">
        ${showNav ? `<button class="nav prev" onclick="changeImage(${p.id}, -1)">‹</button>
                      <button class="nav next" onclick="changeImage(${p.id}, 1)">›</button>` : ''}
        <div class="image-counter">${currentIdx+1}/${totalImgs}</div>
      </div>
      <div class="content">
        <h3>${p.title}</h3>
        <div class="price">${p.price}</div>
        <div class="info">📍 ${p.area}</div>
        <div class="info">📐 ${p.size} sqft | 🛏 ${p.bedroom} | 🚿 ${p.bathroom}</div>
        <div class="info">🛠 ${p.renovate} | 🪑 ${p.furnish} | 🚗 ${p.parking}</div>
        <div class="info">📜 ${p.tenure}</div>
        <a class="btn" href="${buildWALink(p)}" target="_blank">WhatsApp</a>
      </div>
    </div>
  `;
}

// 图片切换（全局）
window.changeImage = function(propId, delta) {
  const prop = allProperties.find(p => p.id === propId);
  if (!prop || !prop.images.length) return;
  let newIdx = (imgIndex[propId] || 0) + delta;
  if (newIdx < 0) newIdx = prop.images.length - 1;
  if (newIdx >= prop.images.length) newIdx = 0;
  imgIndex[propId] = newIdx;
  const imgElem = document.getElementById(`img${propId}`);
  if (imgElem) imgElem.src = prop.images[newIdx];
  const counterDiv = imgElem?.parentElement?.querySelector('.image-counter');
  if (counterDiv) counterDiv.innerText = `${newIdx+1}/${prop.images.length}`;
};

// 当筛选或排序变化时，重置到第一页并刷新所有
function onFilterChange() {
  currentPage = 1;
  renderExclusive();
  renderNormalPaged();
}

// 绑定筛选事件
document.querySelectorAll('#type, #area, #sort, #search').forEach(el => el.addEventListener('input', onFilterChange));

// 启动
loadData();
</script>
