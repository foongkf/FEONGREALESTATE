<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"/>
  <title>Feong Real Estate — Penang</title>
  <style>
    :root {
      --card-min-height: 380px;
      --card-min-height-mobile: 360px;
      --tag-bg: #f5f5f7;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 16px 28px rgba(0, 0, 0, 0.1);
      --border-light: #e8e8ed;
      --text-dark: #1d1d1f;
      --text-muted: #6e6e73;
      --brand-blue: #0071e3;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:#f0f0f2;color:var(--text-dark);line-height:1.4;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;animation:bgSlide 25s infinite;filter:grayscale(15%) brightness(1.05)}
    @keyframes bgSlide{
      0%,100%{background-image:url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1200&q=80')}
      25%{background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1200&q=80')}
      50%{background-image:url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1200&q=80')}
      75%{background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=1200&q=80')}
    }
    body::after{content:'';position:fixed;inset:0;background:rgba(255,255,255,.4);z-index:-1}
    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .skeleton-card{background:rgba(255,255,255,.6);border-radius:18px;height:380px;animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:.9}}
    .container{max-width:1400px;margin:0 auto;padding:2rem 1.5rem 3rem;position:relative;z-index:1}
    .top-bar{position:fixed;top:24px;right:28px;z-index:1000;display:flex;gap:12px;align-items:center}
    .floating-brand{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);padding:8px 18px;border-radius:40px;box-shadow:0 2px 12px rgba(0,0,0,.05);border:.5px solid rgba(0,0,0,.05);transition:.2s}
    .floating-brand:hover{background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.08)}
    .logo{font-size:22px;opacity:.8}
    .brand-text .name{font-size:13px;font-weight:500}
    .brand-text .sub{font-size:10px;color:var(--text-muted)}
    .icon-btn{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border:.5px solid rgba(0,0,0,.05);border-radius:40px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:.2s;box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .icon-btn:hover{background:#fff;transform:scale(.96)}
    .filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);padding:16px 24px;border-radius:60px;border:.5px solid rgba(0,0,0,.05)}
    select,input{background:#fff;border:1px solid #d2d2d7;border-radius:40px;padding:8px 16px;font-size:13px;font-family:inherit;outline:none}
    select{appearance:none;padding-right:36px}
    input{flex:1;min-width:180px}
    select:focus,input:focus{border-color:var(--brand-blue);box-shadow:0 0 0 3px rgba(0,113,227,.1)}
    .exclusive-section{margin-bottom:48px;position:relative}
    .exclusive-title{font-size:13px;font-weight:500;text-transform:uppercase;background:rgba(255,255,255,.7);padding:6px 16px;border-radius:40px;margin-bottom:20px}
    .horizontal-scroll{overflow-x:auto;white-space:nowrap;padding-bottom:12px}
    .exclusive-grid{display:inline-flex;gap:20px}
    .exclusive-grid .card{width:280px;flex-shrink:0;min-height:var(--card-min-height)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .no-results{text-align:center;padding:60px;background:rgba(255,255,255,.7);border-radius:30px;color:var(--text-muted)}
    .card{background:#fff;border-radius:18px;overflow:hidden;transition:.2s;box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
    .gold-card{background:#fffef7;border-left:3px solid #f5a623}
    .img-box{position:relative;height:160px;overflow:hidden}
    .img-box img{width:100%;height:100%;object-fit:cover}
    .badge,.tag{position:absolute;font-size:9px;padding:3px 8px;border-radius:20px;color:#fff}
    .badge{top:10px;left:10px;background:rgba(0,0,0,.75)}
    .tag{top:10px;right:10px;background:rgba(0,0,0,.75)}
    .tag.sale{background:rgba(230,60,60,.9)}
    .tag.rent{background:rgba(0,113,227,.9)}
    .content{padding:14px;flex:1}
    .price{font-size:18px;font-weight:600;margin:6px 0}
    .detail-tag{background:var(--tag-bg);padding:4px 10px;border-radius:20px;font-size:10px}
    .card-buttons{display:flex;gap:10px;padding:0 14px 14px}
    .btn,.btn-outline{flex:1;padding:8px;border-radius:12px;font-size:13px;text-align:center}
    .btn{background:var(--text-dark);color:#fff}
    .btn-outline{border:1px solid #d2d2d7}
    .btn-fav{width:32px;height:32px;border-radius:50%;border:1px solid #d2d2d7}
    footer{text-align:center;padding:24px;margin-top:40px;background:rgba(255,255,255,.7)}
  </style>
</head>
<body>

<div class="top-bar">
  <div class="floating-brand">
    <div class="logo">🏙️</div>
    <div class="brand-text">
      <div class="name">FEONG REAL ESTATE</div>
      <div class="sub">Penang Property Listing</div>
    </div>
  </div>
  <div class="icon-btn" id="favoritesIcon">❤️</div>
  <div class="icon-btn" id="historyIcon">🕒</div>
</div>

<div class="container">
  <div class="filters">
    <select id="type"><option value="all">All</option><option value="sale">For Sale</option><option value="rent">For Rent</option></select>
    <select id="area"><option value="all">Area</option></select>
    <select id="sort"><option value="default">Default</option><option value="low">Price Low → High</option><option value="high">Price High → Low</option></select>
    <input id="search" placeholder="Search by property name..." />
  </div>

  <div class="exclusive-section">
    <div class="exclusive-title">⭐ Exclusive Listings</div>
    <div class="horizontal-scroll"><div class="exclusive-grid" id="exclusiveGrid"></div></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<footer>FEONG: 014-7405020 | REN 61687 | Today Properties</footer>

<script>
const $=id=>document.getElementById(id)
const getNum=s=>parseInt((s||'').replace(/\D/g,''))||0
const fmt=p=>p?`RM ${getNum(p).toLocaleString()}`:''
const img=u=>u||'https://placehold.co/600x400'
let data=[],imgIdx={}

function sample(){
return[{id:1,title:"Maritime",area:"Gurney",priceRaw:"1200000",type:"sale",exclusive:true,images:["https://placehold.co/600x400"]}]
.map(p=>({...p,price:fmt(p.priceRaw),priceNum:getNum(p.priceRaw)}))
}

function renderCard(p){
const i=imgIdx[p.id]||0
return `<div class="card ${p.exclusive?'gold-card':''}">
<div class="img-box">
${p.exclusive?'<div class="badge">⭐</div>':''}
<img src="${p.images[i]||img()}">
</div>
<div class="content">
<div>${p.title}</div>
<div class="price">${p.price}</div>
<div>${p.area}</div>
</div>
<div class="card-buttons">
<a class="btn" href="#">WhatsApp</a>
<button class="btn-outline">View</button>
<button class="btn-fav">❤️</button>
</div></div>`
}

function render(){
const grid=$('grid')
grid.innerHTML=data.map(renderCard).join('')
}

function init(){
data=sample()
data.forEach(p=>imgIdx[p.id]=0)
render()
}

init()
</script>
</body>
</html>
