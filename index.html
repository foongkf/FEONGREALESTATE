<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feong Real Estate — Penang</title>

<style>
:root{
  --text:#1d1d1f;
  --muted:#6e6e73;
  --bg:#f5f5f7;
  --card:#fff;
  --shadow:0 10px 25px rgba(0,0,0,.08);
  --primary:#0071e3;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  background:#f0f0f2;
  color:var(--text);
}

/* layout */
.container{max-width:1200px;margin:auto;padding:20px}

/* filters */
.filters{
  display:flex;gap:10px;flex-wrap:wrap;
  background:#fff;padding:12px;border-radius:20px;
  box-shadow:var(--shadow);margin-bottom:20px;
}
select,input{
  padding:8px 12px;border-radius:12px;
  border:1px solid #ddd;
}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}

/* card */
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
}
.img{
  height:160px;
  background:#eee;
  position:relative;
}
.img img{width:100%;height:100%;object-fit:cover}
.content{padding:12px}
.price{font-weight:600;margin:6px 0}
.area{font-size:12px;color:var(--muted)}

.btns{
  display:flex;gap:8px;padding:12px;
}
.btn{
  flex:1;padding:8px;border-radius:10px;
  border:none;cursor:pointer;
}
.btn.primary{background:var(--primary);color:#fff}
.btn.outline{border:1px solid #ddd;background:#fff}
.btn.fav{width:40px}

/* modal */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;
  padding:20px;
}
.modal-content{
  background:#fff;border-radius:16px;
  max-width:600px;width:100%;
  padding:20px;
}

/* small modal */
.small-list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;gap:10px;padding:10px;background:#f5f5f7;border-radius:12px;cursor:pointer}
.item img{width:50px;height:50px;object-fit:cover;border-radius:8px}
</style>
</head>

<body>

<div class="container">

  <div class="filters">
    <select id="type">
      <option value="all">All</option>
      <option value="sale">Sale</option>
      <option value="rent">Rent</option>
    </select>

    <input id="search" placeholder="Search..." />
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- detail modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="mTitle"></h2>
    <p id="mPrice"></p>
    <p id="mArea"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- favorites -->
<div class="modal" id="favModal">
  <div class="modal-content">
    <h3>Favorites</h3>
    <div id="favList" class="small-list"></div>
  </div>
</div>

<script>
/* ================= DATA ================= */
let data = [];
let filtered = [];
let fav = JSON.parse(localStorage.getItem("fav")||"[]");
let recent = JSON.parse(localStorage.getItem("recent")||"[]");

/* sample */
data = [
  {id:1,title:"Maritime",price:1200000,area:"Gurney",type:"sale",img:"https://placehold.co/600x400"},
  {id:2,title:"Quayside",price:900000,area:"Tanjung",type:"sale",img:"https://placehold.co/600x400"},
  {id:3,title:"Light",price:2500,area:"Jelutong",type:"rent",img:"https://placehold.co/600x400"}
];

filtered = [...data];

/* ================= RENDER ================= */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.map(p=>`
    <div class="card">
      <div class="img">
        <img src="${p.img}">
      </div>
      <div class="content">
        <div>${p.title}</div>
        <div class="price">RM ${p.price}</div>
        <div class="area">${p.area}</div>
      </div>
      <div class="btns">
        <button class="btn primary" onclick="openModal(${p.id})">View</button>
        <button class="btn outline" onclick="wa(${p.id})">WA</button>
        <button class="btn fav" onclick="toggleFav(${p.id})">
          ${fav.includes(p.id)?"❤️":"🤍"}
        </button>
      </div>
    </div>
  `).join("");
}

/* ================= FILTER ================= */
function applyFilter(){
  const type = document.getElementById("type").value;
  const search = document.getElementById("search").value.toLowerCase();

  filtered = data.filter(p=>{
    return (type==="all"||p.type===type)
    && p.title.toLowerCase().includes(search);
  });

  render();
}

/* debounce */
let t;
document.getElementById("search").addEventListener("input",()=>{
  clearTimeout(t);
  t=setTimeout(applyFilter,200);
});
document.getElementById("type").addEventListener("change",applyFilter);

/* ================= FAVORITES ================= */
function toggleFav(id){
  if(fav.includes(id)){
    fav=fav.filter(i=>i!==id);
  }else fav.push(id);

  localStorage.setItem("fav",JSON.stringify(fav));
  render();
}

/* ================= MODAL ================= */
let current=null;

function openModal(id){
  current=data.find(p=>p.id===id);
  document.getElementById("mTitle").innerText=current.title;
  document.getElementById("mPrice").innerText="RM "+current.price;
  document.getElementById("mArea").innerText=current.area;

  document.getElementById("modal").style.display="flex";
  document.body.style.overflow="hidden";

  addRecent(id);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.body.style.overflow="auto";
}

window.onclick=e=>{
  if(e.target.classList.contains("modal")) closeModal();
}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeModal();
});

/* ================= WHATSAPP ================= */
function wa(id){
  const p=data.find(x=>x.id===id);
  const msg=encodeURIComponent(`Hi interested: ${p.title} RM ${p.price}`);
  window.open(`https://wa.me/60147405020?text=${msg}`);
}

/* ================= RECENT ================= */
function addRecent(id){
  recent = recent.filter(i=>i!==id);
  recent.unshift(id);
  recent = recent.slice(0,10);
  localStorage.setItem("recent",JSON.stringify(recent));
}

/* ================= INIT ================= */
render();
</script>

</body>
</html>
