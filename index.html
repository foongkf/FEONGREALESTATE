<script>
// ======================= 工具函数 =======================
function escapeHtml(str){return str?str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])):''}

function formatPrice(priceRaw){
  if(!priceRaw)return''
  const num=parseInt(priceRaw.toString().replace(/[^0-9]/g,''),10)
  return isNaN(num)?priceRaw:`RM ${num.toLocaleString('en-US')}`
}

function getPriceNumber(priceStr){
  const num=parseFloat((priceStr||'').replace(/[^0-9]/g,''))
  return isNaN(num)?0:num
}

function formatImgUrl(url,size='small'){
  if(!url)return''
  if(url.includes('drive.google.com')){
    const id=(url.match(/\/d\/([a-zA-Z0-9_-]+)/)||[])[1]||(url.match(/[?&]id=([a-zA-Z0-9_-]+)/)||[])[1]
    if(id)return`https://drive.google.com/thumbnail?id=${id}&sz=${size==='small'?'w400':'w1200'}`
  }
  return url
}

function parseImages(raw,size='small'){
  if(!raw)return['https://placehold.co/600x400/f5f5f7/86868b?text=No+Image']
  return raw.split('|').map(s=>formatImgUrl(s.trim(),size)).filter(Boolean)
}

function buildWALink(p){
  const img=p.imagesSmall?.[0]||''
  const msg=`Hi, I’m interested in this property:
🏠 ${p.title}
📍 ${p.area}
💰 ${p.price}
📐 ${p.size} sqft
🛏 ${p.bedroom} bed
🚿 ${p.bathroom} bath
🚗 ${p.parking} park
🛠 ${p.renovate} reno
🪑 ${p.furnish} furnish
📜 ${p.tenure}

📸 ${img}`
  return`https://wa.me/60147405020?text=${encodeURIComponent(msg)}`
}

// ======================= CSV 解析 =======================
function parseCSVRow(line,expectedCols=13){
  let res=[],cur='',q=false
  for(let ch of line){
    if(ch=='"')q=!q
    else if(ch==','&&!q){res.push(cur.trim());cur=''}
    else cur+=ch
  }
  res.push(cur.trim())
  while(res.length<expectedCols)res.push('')
  return res
}

function buildPropertiesFromCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim())
  const props=[]
  for(let i=1;i<lines.length;i++){
    const c=parseCSVRow(lines[i])
    if(!c[0])continue
    const raw=c[10]||''
    props.push({
      id:i,
      title:escapeHtml(c[0]),
      area:escapeHtml(c[1]),
      size:c[2],
      bedroom:c[3],
      bathroom:c[4],
      renovate:c[5],
      furnish:c[6],
      parking:c[7],
      tenure:(c[8]||'').toLowerCase(),
      type:(c[9]||'').toLowerCase(),
      price:formatPrice(raw),
      priceNum:getPriceNumber(raw),
      exclusive:(c[11]||'').toLowerCase()==='yes',
      imagesSmall:parseImages(c[12],'small'),
      imagesLarge:parseImages(c[12],'large')
    })
  }
  return props
}

// ======================= 数据 =======================
let allProperties=[]
let imgIndex={}
let currentPage=1
const ITEMS_PER_PAGE=12

// ======================= 加载数据 =======================
async function loadData(){
  const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv"

  showSkeleton()

  try{
    const res=await fetch(SHEET_URL)
    if(!res.ok)throw new Error()
    const text=await res.text()
    const data=buildPropertiesFromCSV(text)
    if(!data.length)throw new Error()
    allProperties=data
  }catch(e){
    console.warn("CSV failed, using sample")
    allProperties=getSampleProperties()
  }

  allProperties.forEach(p=>imgIndex[p.id]=0)

  populateAreaFilter()
  loadFilters()
  currentPage=1

  renderExclusive()
  renderNormalPaged()
  checkScrollGradient()
}

// ======================= 启动 =======================
loadData().then(()=>{
  initTouchSwipe()
  checkScrollGradient()
})
</script>
