<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEONG REAL ESTATE</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #f8f8f8;
  color: #111;
}

/* Header */
.header {
  position: fixed;
  top: 20px;
  right: 20px;
  text-align: right;
  z-index: 1000;
}
.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 2px;
}
.header p {
  margin: 0;
  font-size: 12px;
  color: #666;
}

/* Filters */
.filters {
  padding: 100px 20px 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
select, input {
  padding: 8px;
  border: 1px solid #ddd;
}

/* Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.tags {
  padding: 10px;
}
.tag {
  display: inline-block;
  background: #eee;
  padding: 4px 8px;
  margin: 2px;
  font-size: 12px;
  border-radius: 6px;
}

/* Buttons */
.buttons {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}
button {
  border: none;
  padding: 8px;
  cursor: pointer;
}
.whatsapp { background: #25D366; color: white; }
.detail { background: black; color: white; }
.fav { background: #ddd; }

/* Exclusive */
.exclusive {
  padding: 20px;
  overflow-x: auto;
  display: flex;
  gap: 10px;
}
.exclusive .card {
  min-width: 300px;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="header">
  <h1>FEONG REAL ESTATE</h1>
  <p>Penang Property Listing</p>
</div>

<div class="filters">
  <select id="typeFilter">
    <option value="">All Type</option>
    <option value="sale">Sale</option>
    <option value="rent">Rent</option>
  </select>

  <select id="areaFilter"></select>

  <select id="priceSort">
    <option value="">Sort Price</option>
    <option value="high">High → Low</option>
    <option value="low">Low → High</option>
  </select>

  <input type="text" id="search" placeholder="Search Title">
</div>

<h3 style="padding:20px;">Exclusive</h3>
<div class="exclusive" id="exclusive"></div>

<div class="grid" id="grid"></div>

<footer>
FEONG: 014-7405020 | REN 61687 | Today Properties
</footer>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";

let data = [];

fetch(url)
.then(res => res.text())
.then(csv => {
  const rows = csv.split("\n").map(r => r.split(","));
  const headers = rows[0];

  data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = r[i]);
    return obj;
  });

  init();
});

function init(){
  populateArea();
  render();
}

function populateArea(){
  const areas = [...new Set(data.map(d=>d.Area).filter(Boolean))];
  const select = document.getElementById("areaFilter");
  areas.forEach(a=>{
    let opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    select.appendChild(opt);
  });
}

function render(){
  let filtered = [...data];

  const type = typeFilter.value;
  const area = areaFilter.value;
  const search = document.getElementById("search").value.toLowerCase();

  if(type) filtered = filtered.filter(d=>d.Type===type);
  if(area) filtered = filtered.filter(d=>d.Area===area);
  if(search) filtered = filtered.filter(d=>d.Title.toLowerCase().includes(search));

  if(priceSort.value==="high"){
    filtered.sort((a,b)=>b.Price - a.Price);
  }
  if(priceSort.value==="low"){
    filtered.sort((a,b)=>a.Price - b.Price);
  }

  grid.innerHTML="";
  exclusive.innerHTML="";

  filtered.forEach(d=>{
    const card = createCard(d);

    if(d.Exclusive==="yes"){
      exclusive.appendChild(card);
    }else{
      grid.appendChild(card);
    }
  });
}

function createCard(d){
  const div = document.createElement("div");
  div.className="card";

  let imgs = d.Images ? d.Images.split("|") : [];
  let img = imgs[0] || "";

  div.innerHTML = `
    <img src="${img}">
    <div style="padding:10px;">
      <h3>${d.Title || ""}</h3>
      <p>${d.Price || ""}</p>
    </div>
    <div class="tags">
      ${createTags(d)}
    </div>
    <div class="buttons">
      <button class="whatsapp" onclick="wa('${d.Title}')">WhatsApp</button>
      <button class="detail" onclick="detail('${d.Title}')">Details</button>
      <button class="fav" onclick="fav('${d.Title}')">❤</button>
    </div>
  `;

  return div;
}

function createTags(d){
  let fields = ["Bedroom","Bathroom","Built Up","Parking","Tenure"];
  return fields.map(f=>{
    return d[f] ? `<span class="tag">${d[f]}</span>` : "";
  }).join("");
}

function wa(title){
  let msg = encodeURIComponent("Hi, I'm interested in: " + title);
  window.open(`https://wa.me/60147405020?text=${msg}`);
}

function detail(title){
  alert(title);
}

function fav(title){
  let favs = JSON.parse(localStorage.getItem("fav")||"[]");
  favs.push(title);
  localStorage.setItem("fav", JSON.stringify(favs));
}

typeFilter.onchange = render;
areaFilter.onchange = render;
priceSort.onchange = render;
search.oninput = render;

</script>

</body>
</html>
