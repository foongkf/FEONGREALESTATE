<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FEONG REAL ESTATE PENANG</title>
  <style>
    :root{
      --bg: #0b0f14;
      --card: rgba(255,255,255,0.92);
      --glass: rgba(255,255,255,0.75);
      --text: #111;
      --muted: rgba(0,0,0,0.6);
      --accent: #c9a24e;
    }

    *{box-sizing:border-box;}

    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      overflow-x:hidden;
    }

    /* 🌆 background slideshow */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      z-index:-2;
      background-size:cover;
      background-position:center;
      animation:bgSlide 25s infinite;
      filter:grayscale(40%) brightness(0.4);
    }

    body::after{
      content:'';
      position:fixed;
      inset:0;
      z-index:-1;
      background:rgba(0,0,0,0.55);
    }

    @keyframes bgSlide{
      0%{background-image:url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=2000&q=80');}
      25%{background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=2000&q=80');}
      50%{background-image:url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=2000&q=80');}
      75%{background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=2000&q=80');}
      100%{background-image:url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=2000&q=80');}
    }

    /* ===== HEADER ===== */
    header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:1000;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 24px;
      background:rgba(255,255,255,0.75);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(0,0,0,0.08);
      transition:all .3s ease;
    }

    header.shrink{
      padding:10px 18px;
      background:rgba(255,255,255,0.9);
    }

    .brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }

    .brand h1{
      font-size:16px;
      letter-spacing:2px;
      margin:0;
      text-transform:uppercase;
      color:#111;
    }

    .brand p{
      margin:0;
      font-size:11px;
      color:rgba(0,0,0,0.6);
      letter-spacing:1px;
    }

    .header-actions{
      font-size:12px;
      color:rgba(0,0,0,0.6);
    }

    /* ===== layout ===== */
    .container{
      padding:110px 16px 40px;
      max-width:1200px;
      margin:auto;
    }

    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    select,input{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,0.1);
      background:rgba(255,255,255,0.9);
    }

    /* ===== exclusive ===== */
    .exclusive-title{
      font-size:12px;
      font-weight:500;
      margin-bottom:10px;
      color:#111;
      display:inline-block;
      padding:6px 10px;
      border:1px solid rgba(0,0,0,0.15);
      border-radius:999px;
      background:rgba(255,255,255,0.6);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;
    }

    .gold-card{
      background:linear-gradient(135deg,#fff7ed,#fde68a);
      border:2px solid var(--accent);
    }

    /* ===== card ===== */
    .card{
      background:var(--card);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      display:flex;
      flex-direction:column;
    }

    .img-box{position:relative;height:180px;}
    .img-box img{width:100%;height:100%;object-fit:cover;}

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:rgba(0,0,0,0.35);
      color:#fff;
      border:none;
      padding:6px 10px;
      cursor:pointer;
    }

    .prev{left:8px;}
    .next{right:8px;}

    .badge{
      position:absolute;
      top:10px;
      left:10px;
      background:var(--accent);
      color:#fff;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
    }

    .tag{
      position:absolute;
      top:10px;
      right:10px;
      padding:4px 10px;
      border-radius:999px;
      font-size:11px;
      color:#fff;
      font-weight:bold;
    }

    .tag.sale{background:#ef4444;}
    .tag.rent{background:#3b82f6;}

    .content{padding:12px;}

    .price{
      color:#16a34a;
      font-weight:bold;
      font-size:17px;
      margin:6px 0;
    }

    .info{
      font-size:12px;
      margin:4px 0;
      color:#444;
    }

    .btn{
      display:block;
      text-align:center;
      background:#25D366;
      color:#fff;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      text-decoration:none;
    }

    /* ===== footer ===== */
    footer{
      text-align:center;
      padding:18px;
      margin-top:20px;
      background:rgba(255,255,255,0.75);
      color:#111;
      border-top:1px solid rgba(0,0,0,0.08);
      backdrop-filter:blur(12px);
      font-size:12px;
    }

  </style>
</head>
<body>

<header id="header">
  <div class="brand">
    <h1>FEONG REAL ESTATE</h1>
    <p>Penang Property Listing</p>
  </div>
  <div class="header-actions">Luxury Property Network</div>
</header>

<div class="container">

  <div class="filters">
    <select id="type">
      <option value="all">All</option>
      <option value="sale">For Sale</option>
      <option value="rent">For Rent</option>
    </select>

    <select id="area"><option value="all">Area</option></select>

    <select id="sort">
      <option value="default">Default</option>
      <option value="exclusive">Exclusive First</option>
      <option value="low">Price Low → High</option>
      <option value="high">Price High → Low</option>
    </select>

    <input id="search" placeholder="Search..." />
  </div>

  <div class="exclusive-section">
    <div class="exclusive-title">Exclusive Listings</div>
    <div class="grid" id="exclusiveGrid"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<footer>
  FEONG REAL ESTATE | 014-7405020 | REN 61687 | Penang Luxury Homes
</footer>

<script>
const header = document.getElementById('header');
window.addEventListener('scroll',()=>{
  if(window.scrollY>40){header.classList.add('shrink');}
  else{header.classList.remove('shrink');}
});
</script>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";

function buildWA(p){
  const msg = `Hi, I’m interested in this property:\n\n🏠 ${p.title}\n📍 ${p.area}\n💰 ${p.price}\n📐 ${p.size} sqft`;
  return `https://wa.me/60147405020?text=${encodeURIComponent(msg)}`;
}

let data=[];
let imgIndex={};

function clean(v){return (v||"").replace(/\r/g,"" ).replace(/^\"|\"$/g,"" ).trim();}

function parseImages(raw){
  if(!raw) return ["https://via.placeholder.com/400x300"];
  return raw.split("|").map(x=>x.trim());
}

function isExclusive(p){return (p.exclusive||"").toLowerCase()==="yes";}

async function load(){
  const res=await fetch(SHEET_URL);
  const text=await res.text();

  const rows=text.split("\n").slice(1).filter(r=>r.trim());

  data=rows.map((r,i)=>{
    let c=r.split(",");
    return{
      id:i,
      title:clean(c[0]),
      area:clean(c[1]),
      size:clean(c[2]),
      bedroom:clean(c[3]),
      bathroom:clean(c[4]),
      price:clean(c[10]),
      exclusive:clean(c[11]),
      images:parseImages(clean(c[12]||""))
    };
  }).filter(p=>p.title);

  render();
}

function render(){
  const eg=document.getElementById('exclusiveGrid');
  const g=document.getElementById('grid');

  eg.innerHTML=''; g.innerHTML='';

  const ex=data.filter(isExclusive);
  const normal=data.filter(p=>!isExclusive(p));

  ex.forEach(p=>eg.innerHTML+=card(p,true));
  normal.forEach(p=>g.innerHTML+=card(p,false));
}

function card(p, gold){
  imgIndex[p.id]=imgIndex[p.id]||0;
  const img=p.images[imgIndex[p.id]];

  return `
  <div class="card ${gold?'gold-card':''}">
    <div class="img-box">
      ${isExclusive(p)?'<div class="badge">EXCLUSIVE</div>':''}
      <img src="${img}" />
      <button class="nav prev" onclick="prev(${p.id})">‹</button>
      <button class="nav next" onclick="next(${p.id})">›</button>
    </div>
    <div class="content">
      <h3>${p.title}</h3>
      <div class="price">${p.price}</div>
      <div class="info">📍 ${p.area}</div>
      <div class="info">📐 ${p.size} sqft</div>
      <a class="btn" href="${buildWA(p)}" target="_blank">WhatsApp</a>
    </div>
  </div>`;
}

function next(id){
  const p=data.find(x=>x.id==id);
  imgIndex[id]=(imgIndex[id]+1)%p.images.length;
  document.getElementById('img'+id).src=p.images[imgIndex[id]];
}

function prev(id){
  const p=data.find(x=>x.id==id);
  imgIndex[id]=(imgIndex[id]-1+p.images.length)%p.images.length;
  document.getElementById('img'+id).src=p.images[imgIndex[id]];
}

load();
</script>

</body>
</html>
