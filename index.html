<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"/>
  <title>Feong Real Estate — Penang</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:#f0f0f2;color:#1d1d1f;line-height:1.4;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    /* 背景幻灯片 */
    body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background-size:cover;background-position:center;animation:bgSlide 25s infinite;filter:grayscale(15%) brightness(1.05);}
    @keyframes bgSlide{0%{background-image:url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1200&q=80');}25%{background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1200&q=80');}50%{background-image:url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1200&q=80');}75%{background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=1200&q=80');}100%{background-image:url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1200&q=80');}}
    body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.4);z-index:-1;}
    /* 骨架屏 */
    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
    .skeleton-card{background:rgba(255,255,255,0.6);border-radius:18px;height:380px;animation:pulse 1.2s infinite ease-in-out;}
    @keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:0.9;}}
    .container{max-width:1400px;margin:0 auto;padding:2rem 1.5rem 3rem;position:relative;z-index:1;}
    /* 顶部栏 */
    .top-bar{position:fixed;top:24px;right:28px;z-index:1000;display:flex;gap:12px;align-items:center;}
    .floating-brand{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);padding:8px 18px;border-radius:40px;box-shadow:0 2px 12px rgba(0,0,0,0.05);border:0.5px solid rgba(0,0,0,0.05);transition:all 0.2s ease;cursor:default;}
    .floating-brand:hover{background:white;box-shadow:0 4px 18px rgba(0,0,0,0.08);}
    .logo{font-size:22px;opacity:0.8;}
    .brand-text .name{font-size:13px;font-weight:500;letter-spacing:-0.2px;color:#1d1d1f;}
    .brand-text .sub{font-size:10px;color:#6e6e73;}
    .icon-btn{background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border:0.5px solid rgba(0,0,0,0.05);border-radius:40px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
    .icon-btn:hover{background:white;transform:scale(0.96);}
    /* 筛选栏 */
    .filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px;background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);padding:16px 24px;border-radius:60px;border:0.5px solid rgba(0,0,0,0.05);}
    select,input{background:#fff;border:1px solid #d2d2d7;border-radius:40px;padding:8px 16px;font-size:13px;font-family:inherit;color:#1d1d1f;outline:none;transition:all 0.2s;cursor:pointer;}
    select{appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');background-repeat:no-repeat;background-position:right 14px center;padding-right:36px;}
    input{flex:1;min-width:180px;}
    select:focus,input:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,0.1);}
    /* 独占区 */
    .exclusive-section{margin-bottom:48px;position:relative;}
    .exclusive-title{font-size:13px;font-weight:500;letter-spacing:0.3px;text-transform:uppercase;color:#1d1d1f;background:rgba(255,255,255,0.7);backdrop-filter:blur(8px);display:inline-block;padding:6px 16px;border-radius:40px;margin-bottom:20px;border:0.5px solid rgba(0,0,0,0.05);}
    .horizontal-scroll{overflow-x:auto;overflow-y:hidden;white-space:nowrap;scrollbar-width:thin;-webkit-overflow-scrolling:touch;padding-bottom:12px;scroll-behavior:smooth;}
    .horizontal-scroll::-webkit-scrollbar{height:6px;}
    .horizontal-scroll::-webkit-scrollbar-track{background:rgba(0,0,0,0.1);border-radius:10px;}
    .horizontal-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.3);border-radius:10px;}
    .scroll-gradient{position:absolute;right:0;top:30px;bottom:12px;width:60px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.8));pointer-events:none;z-index:2;border-radius:0 20px 20px 0;}
    .exclusive-grid{display:inline-flex;gap:20px;align-items:stretch;}
    .exclusive-grid .card{width:280px;flex-shrink:0;min-height:380px;}
    /* 普通网格 */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-bottom:32px;}
    .no-results{text-align:center;padding:60px 20px;background:rgba(255,255,255,0.7);border-radius:30px;color:#6e6e73;font-size:15px;}
    /* 卡片 */
    .card{background:#fff;border-radius:18px;overflow:hidden;transition:transform 0.2s ease,box-shadow 0.2s ease;box-shadow:0 8px 20px rgba(0,0,0,0.05);border:0.5px solid #e8e8ed;display:flex;flex-direction:column;height:100%;position:relative;}
    .card:hover{transform:translateY(-3px);box-shadow:0 16px 28px rgba(0,0,0,0.1);}
    .gold-card{background:#fffef7;border-left:3px solid #f5a623;}
    .img-box{position:relative;height:160px;background:#f5f5f7;flex-shrink:0;}
    .img-box img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s ease;}
    .card:hover .img-box img{transform:scale(1.02);}
    .badge,.tag{position:absolute;top:10px;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);color:#fff;font-size:9px;font-weight:500;padding:3px 8px;border-radius:20px;z-index:2;}
    .badge{left:10px;}
    .tag{right:10px;font-weight:600;}
    .tag.sale{background:rgba(230,60,60,0.9);}
    .tag.rent{background:rgba(0,113,227,0.9);}
    .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);border:none;width:26px;height:26px;border-radius:30px;font-size:18px;color:#1d1d1f;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 1px 2px rgba(0,0,0,0.05);}
    .nav:hover{background:white;}
    .prev{left:8px;}
    .next{right:8px;}
    .image-counter{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);color:#fff;font-size:9px;padding:2px 6px;border-radius:12px;z-index:2;}
    .content{padding:14px 14px 0;flex:1;display:flex;flex-direction:column;}
    .content h3{font-size:16px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .price{font-size:18px;font-weight:600;margin:6px 0 8px;}
    .info{font-size:11px;color:#6e6e73;margin-bottom:6px;}
    .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
    .detail-tag{background:#f5f5f7;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;color:#1d1d1f;}
    .card-buttons{display:flex;gap:8px;margin-top:auto;padding:0 14px 14px 14px;}
    .btn,.btn-outline,.btn-fav{flex:1;text-align:center;padding:8px 0;border-radius:12px;font-weight:500;font-size:13px;text-decoration:none;transition:all 0.2s;cursor:pointer;border:none;font-family:inherit;}
    .btn{background:#1d1d1f;color:#fff;}
    .btn:hover{background:#000;transform:scale(0.97);}
    .btn-outline{background:transparent;border:1px solid #d2d2d7;color:#1d1d1f;}
    .btn-outline:hover{background:#f5f5f7;border-color:#1d1d1f;}
    .btn-fav{background:transparent;border:1px solid #d2d2d7;color:#ff3b30;font-size:16px;padding:6px 0;}
    .btn-fav:hover{background:#f5f5f7;transform:scale(0.96);}
    /* 分页 */
    .pagination{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:20px;flex-wrap:wrap;}
    .pagination button,.page-numbers span{background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border:0.5px solid rgba(0,0,0,0.05);padding:8px 16px;border-radius:40px;font-size:13px;font-weight:500;color:#1d1d1f;cursor:pointer;transition:all 0.2s;font-family:inherit;}
    .pagination button:hover:not(:disabled){background:white;transform:scale(0.96);}
    .pagination button:disabled{opacity:0.4;cursor:not-allowed;}
    .page-numbers{display:flex;gap:8px;flex-wrap:wrap;}
    .page-numbers span.active{background:#1d1d1f;color:#fff;border:none;}
    .page-jump{display:inline-flex;align-items:center;gap:5px;}
    .page-jump input{width:60px;text-align:center;padding:6px;border-radius:30px;}
    footer{text-align:center;padding:24px 20px;margin-top:40px;background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);border-top:0.5px solid rgba(0,0,0,0.05);color:#6e6e73;font-size:12px;}
    /* 模态框 */
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:2000;justify-content:center;align-items:center;overflow-y:auto;padding:20px;}
    .modal-content{max-width:700px;width:100%;background:#fff;border-radius:28px;overflow:hidden;animation:modalFadeIn 0.2s ease;}
    @keyframes modalFadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
    .modal-img-box{position:relative;height:320px;background:#f5f5f7;}
    .modal-img-box img{width:100%;height:100%;object-fit:cover;}
    .modal-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border:none;width:36px;height:36px;border-radius:40px;font-size:24px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:0.2s;}
    .modal-nav:hover{background:#fff;}
    .modal-prev{left:16px;}
    .modal-next{right:16px;}
    .modal-counter{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);color:#fff;padding:4px 10px;border-radius:30px;font-size:12px;z-index:10;}
    .modal-close{position:absolute;top:16px;right:16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
    .modal-close:hover{background:rgba(0,0,0,0.8);}
    .modal-details{padding:24px;}
    .modal-details h2{font-size:24px;font-weight:600;margin-bottom:8px;}
    .modal-price{font-size:28px;font-weight:700;margin:12px 0 8px;}
    .modal-area{font-size:16px;color:#6e6e73;margin-bottom:16px;}
    .modal-tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;}
    .modal-tag{background:#f5f5f7;padding:6px 14px;border-radius:30px;font-size:13px;font-weight:500;}
    .modal-wa-btn{display:block;background:#25D366;color:#fff;text-align:center;padding:14px;border-radius:40px;text-decoration:none;font-weight:600;margin-top:20px;transition:0.2s;}
    .modal-wa-btn:hover{background:#1ebe5d;transform:scale(0.98);}
    /* 小型模态框 */
    .small-modal-content{max-width:500px;background:#fff;border-radius:28px;padding:20px;max-height:80vh;overflow-y:auto;}
    .small-modal-content h3{font-size:20px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
    .close-small{cursor:pointer;font-size:24px;}
    .favorite-list,.history-list{display:flex;flex-direction:column;gap:12px;}
    .favorite-item,.history-item{display:flex;gap:12px;align-items:center;padding:10px;background:#f5f5f7;border-radius:16px;cursor:pointer;transition:0.1s;}
    .favorite-item:hover,.history-item:hover{background:#e8e8ed;}
    .favorite-item img,.history-item img{width:60px;height:60px;object-fit:cover;border-radius:12px;}
    .favorite-item .info,.history-item .info{flex:1;}
    .favorite-item .title,.history-item .title{font-weight:600;font-size:14px;}
    .remove-fav{background:none;border:none;font-size:18px;cursor:pointer;color:#ff3b30;padding:4px;}
    /* 移动端 */
    @media (max-width:768px){
      .container{padding:1.2rem 1rem;}
      .filters{margin-top:60px;margin-bottom:24px;padding:12px 18px;}
      .exclusive-grid .card{width:260px;min-height:360px;}
      .grid{gap:14px;}
      .pagination button,.page-numbers span{padding:6px 12px;font-size:12px;}
      .detail-tag{font-size:9px;padding:3px 8px;}
      .modal-img-box{height:250px;}
      .modal-details h2{font-size:20px;}
      .modal-price{font-size:24px;}
      .top-bar{top:16px;right:16px;}
      .icon-btn{width:40px;height:40px;font-size:18px;}
      .btn-fav{font-size:14px;}
    }
  </style>
</head>
<body>
<div class="top-bar">
  <div class="floating-brand"><div class="logo">🏙️</div><div class="brand-text"><div class="name">FEONG REAL ESTATE</div><div class="sub">Penang Property Listing</div></div></div>
  <div class="icon-btn" id="favoritesIcon">❤️</div>
  <div class="icon-btn" id="historyIcon">🕒</div>
</div>
<div class="container">
  <div class="filters">
    <select id="type"><option value="all">All</option><option value="sale">For Sale</option><option value="rent">For Rent</option></select>
    <select id="area"><option value="all">Area</option></select>
    <select id="sort"><option value="default">Default</option><option value="exclusive">Exclusive First</option><option value="low">Price Low → High</option><option value="high">Price High → Low</option></select>
    <input id="search" placeholder="Search by property name...">
  </div>
  <div class="exclusive-section"><div class="exclusive-title">⭐ Exclusive Listings</div><div class="horizontal-scroll" id="exclusiveScroll"><div class="exclusive-grid" id="exclusiveGrid"></div></div><div class="scroll-gradient" id="scrollGradient" style="display:none"></div></div>
  <div id="normalContainer"><div class="grid" id="grid"></div><div class="pagination" id="pagination"></div></div>
</div>
<footer>FEONG: 014-7405020 | REN 61687 | Today Properties</footer>
<!-- 模态框 -->
<div id="detailModal" class="modal"><div class="modal-content"><div class="modal-img-box"><img id="modalImage" src=""><button class="modal-nav modal-prev" id="modalPrev">‹</button><button class="modal-nav modal-next" id="modalNext">›</button><div class="modal-counter" id="modalCounter">1/1</div><button class="modal-close" id="modalClose">✕</button></div><div class="modal-details"><h2 id="modalTitle"></h2><div class="modal-price" id="modalPrice"></div><div class="modal-area" id="modalArea"></div><div class="modal-tags" id="modalTags"></div><a href="#" id="modalWALink" class="modal-wa-btn" target="_blank">📲 Contact via WhatsApp</a></div></div></div>
<div id="favoritesModal" class="modal"><div class="small-modal-content"><h3>❤️ Favorites <span class="close-small" id="closeFavorites">✕</span></h3><div id="favoritesList" class="favorite-list"></div></div></div>
<div id="historyModal" class="modal"><div class="small-modal-content"><h3>🕒 Recently Viewed <span class="close-small" id="closeHistory">✕</span></h3><div id="historyList" class="history-list"></div></div></div>
<script>
// 工具函数
const escapeHtml=s=>s?s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'):'';
const formatPrice=p=>{let n=p?parseInt(p.toString().replace(/[^0-9]/g,''),10):0;return n?`RM ${n.toLocaleString('en-US')}`:p||'';};
const getPriceNum=p=>{let n=parseFloat((p||'').replace(/[^0-9]/g,''));return isNaN(n)?0:n;};
const formatImgUrl=(u,s)=>u&&u.includes('drive.google.com')?(m=>m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=${s==='small'?'w400':'w1200'}`:u)(u.match(/\/d\/([a-zA-Z0-9_-]+)/)):u||'';
const parseImages=(r,s)=>r?r.split('|').map(t=>t.trim()).filter(Boolean).map(u=>formatImgUrl(u,s)):['https://placehold.co/600x400/f5f5f7/86868b?text=No+Image'];
const buildWALink=p=>`https://wa.me/60147405020?text=${encodeURIComponent(`Hi, I’m interested in this property:\n🏠 ${p.title}\n📍 ${p.area}\n💰 ${p.price}\n📐 ${p.size} sqft\n🛏 ${p.bedroom} bed\n🚿 ${p.bathroom} bath\n🚗 ${p.parking} park\n🛠 ${p.renovate} reno\n🪑 ${p.furnish} furnish\n📜 ${p.tenure}\n\n📸 Image: ${p.imagesSmall[0]||''}\n\nPlease give me more details.`)}`;
// localStorage
const getFav=()=>JSON.parse(localStorage.getItem('favorites')||'[]');
const saveFav=f=>localStorage.setItem('favorites',JSON.stringify(f));
const toggleFav=id=>{let f=getFav();f.includes(id)?f=f.filter(i=>i!==id):f.push(id);saveFav(f);return f.includes(id);};
const isFav=id=>getFav().includes(id);
const getRecent=()=>JSON.parse(localStorage.getItem('recentViews')||'[]');
const addRecent=id=>{let r=getRecent();r=r.filter(i=>i!==id);r.unshift(id);if(r.length>10)r.pop();localStorage.setItem('recentViews',JSON.stringify(r));};
const saveFilters=()=>localStorage.setItem('propertyFilters',JSON.stringify({type:typeEl.value,area:areaEl.value,sort:sortEl.value,search:searchEl.value}));
const loadFilters=()=>{let s=localStorage.getItem('propertyFilters');if(s){let f=JSON.parse(s);if(f.type)typeEl.value=f.type;if(f.area)areaEl.value=f.area;if(f.sort)sortEl.value=f.sort;if(f.search)searchEl.value=f.search;}};
// 全局变量
let allProperties=[],imgIndex={},currentPage=1,currentModalProp=null,currentModalImgIdx=0;
const ITEMS_PER_PAGE=12;
const typeEl=document.getElementById('type'),areaEl=document.getElementById('area'),sortEl=document.getElementById('sort'),searchEl=document.getElementById('search');
// 解析CSV
const parseCSVRow=(l,e=13)=>{let r=[],inq=!1,cur='';for(let i=0;i<l.length;i++){let ch=l[i];if(ch==='"')inq=!inq;else if(ch===','&&!inq)r.push(cur.trim()),cur='';else cur+=ch;}r.push(cur.trim());if(r.length>e){let pricePart=r.slice(10,r.length-2).join(',');return[...r.slice(0,10),pricePart,...r.slice(-2)];}while(r.length<e)r.push('');return r;};
const buildFromCSV=t=>{let lines=t.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return [];let props=[];for(let i=1;i<lines.length;i++){let cols=parseCSVRow(lines[i]);if(cols.length<10||!cols[0])continue;let rawPrice=cols[10]||'',formatted=formatPrice(rawPrice);props.push({id:i,title:escapeHtml(cols[0]),area:escapeHtml(cols[1]),size:escapeHtml(cols[2]),bedroom:escapeHtml(cols[3]),bathroom:escapeHtml(cols[4]),renovate:escapeHtml(cols[5]),furnish:escapeHtml(cols[6]),parking:escapeHtml(cols[7]),tenure:escapeHtml(cols[8]).toLowerCase(),type:cols[9].toLowerCase(),price:formatted,priceNum:getPriceNum(rawPrice),exclusive:cols[11].toLowerCase()==='yes',imagesRaw:cols[12],imagesSmall:parseImages(cols[12],'small'),imagesLarge:parseImages(cols[12],'large')});}return props;};
// 示例数据
const sampleProps=()=>[["The Maritime Suite","Gurney Drive","1250","3","2","Fully","Partly","2","freehold","sale","1250000",true,"https://placehold.co/800x500/0071e3/white?text=Maritime|https://placehold.co/800x500/f5a623/white?text=Maritime+2"],["Quayside Residence","Tanjung Tokong","980","2","2","Partly","Fully","1","freehold","sale","890000",false,"https://placehold.co/800x500/34c759/white?text=Quayside"],["Penang World City","Bayan Lepas","1100","3","2","Standard","Empty","2","leasehold","rent","2800",false,"https://placehold.co/800x500/ff3b30/white?text=PWC"],["Seri Tanjung Pinang","Tanjung Tokong","1500","4","3","Luxury","Fully","2","freehold","sale","2100000",true,"https://placehold.co/800x500/f5a623/white?text=STP"],["The Light Waterfront","Jelutong","1350","3","2","New","Partly","2","freehold","sale","1480000",false,"https://placehold.co/800x500/5856d6/white?text=Light"],["Setia V Residences","Bayan Lepas","850","2","2","Standard","Fully","1","leasehold","rent","2200",false,"https://placehold.co/800x500/ff9500/white?text=VRes"],["By The Sea","Tanjung Bungah","1050","3","2","Well-maintained","Partly","1","freehold","sale","1050000",true,"https://placehold.co/800x500/af52de/white?text=ByTheSea"],["Mansion One","George Town","700","1","1","Simple","Fully","1","freehold","rent","1800",false,"https://placehold.co/800x500/64d2ff/white?text=Mansion"],["Tri Pinnacle","George Town","1200","3","2","Modern","Empty","2","freehold","sale","1320000",false,"https://placehold.co/800x500/ff2d55/white?text=TriP"],["Jazz Residences","Bayan Lepas","920","2","2","Standard","Partly","1","leasehold","sale","680000",false,"https://placehold.co/800x500/5e5ce6/white?text=Jazz"],["The Landmark","George Town","1600","4","3","Premium","Fully","2","freehold","sale","2450000",true,"https://placehold.co/800x500/ffcc00/white?text=Landmark"],["Ocean View Condo","Tanjung Bungah","1100","3","2","Renovated","Fully","1","freehold","rent","3200",false,"https://placehold.co/800x500/34c759/white?text=Ocean"]].map(r=>({id:r[0],title:r[0],area:r[1],size:r[2],bedroom:r[3],bathroom:r[4],renovate:r[5],furnish:r[6],parking:r[7],tenure:r[8],type:r[9],priceRaw:r[10],exclusive:r[11],imagesRaw:r[12]}));
const getSampleProperties=()=>sampleProps().map(p=>({...p,price:formatPrice(p.priceRaw),priceNum:getPriceNum(p.priceRaw),imagesSmall:parseImages(p.imagesRaw,'small'),imagesLarge:parseImages(p.imagesRaw,'large')}));
// 加载数据
async function loadData(){showSkeleton();try{let resp=await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv");if(!resp.ok)throw new Error();let t=await resp.text(),props=buildFromCSV(t);if(props.length)allProperties=props;else throw new Error();}catch(e){console.warn("Using sample data",e);allProperties=getSampleProperties();}allProperties.forEach(p=>imgIndex[p.id]=0);populateArea();loadFilters();currentPage=1;renderExclusive();renderNormal();checkScrollGradient();}
function showSkeleton(){document.getElementById('grid').innerHTML='<div class="skeleton-grid">'+Array(6).fill('<div class="skeleton-card"></div>').join('')+'</div>';}
function populateArea(){let areas=[...new Set(allProperties.map(p=>p.area).filter(a=>a))];areaEl.innerHTML='<option value="all">Area</option>'+areas.map(a=>`<option value="${a}">${a}</option>`).join('');}
function getFiltered(typeVal,areaVal,searchVal,sortVal,excl){let filtered=allProperties.filter(p=>(typeVal==='all'||p.type.includes(typeVal))&&(areaVal==='all'||p.area===areaVal)&&(!searchVal||p.title.toLowerCase().includes(searchVal)));filtered=filtered.filter(p=>p.exclusive===excl);if(sortVal==='low')filtered.sort((a,b)=>a.priceNum-b.priceNum);else if(sortVal==='high')filtered.sort((a,b)=>b.priceNum-a.priceNum);return filtered;}
function renderExclusive(){let container=document.getElementById('exclusiveGrid'),props=getFiltered(typeEl.value,areaEl.value,searchEl.value.trim().toLowerCase(),sortEl.value,true);container.innerHTML=props.length?props.map(p=>renderCard(p,true)).join(''):'<div class="no-results" style="width:100%;text-align:center">No exclusive listings found</div>';}
function renderNormal(){let props=getFiltered(typeEl.value,areaEl.value,searchEl.value.trim().toLowerCase(),sortEl.value,false),total=Math.ceil(props.length/ITEMS_PER_PAGE);if(total>0&¤tPage>total)currentPage=total;if(currentPage<1)currentPage=1;let start=(currentPage-1)*ITEMS_PER_PAGE,pageItems=props.slice(start,start+ITEMS_PER_PAGE),grid=document.getElementById('grid');grid.innerHTML=pageItems.length?pageItems.map(p=>renderCard(p,false)).join(''):'<div class="no-results">🏠 No properties match your criteria.<br>Try adjusting filters.</div>';renderPagination(total);document.querySelectorAll('.card img').forEach(img=>img.loading='lazy');}
function renderCard(p,isGold){let images=p.imagesSmall,idx=imgIndex[p.id]||0,img=images[idx]||images[0],total=images.length,showNav=total>1,tag=p.type.includes('rent')?'rent':'sale',tagLabel=tag==='rent'?'RENT':'SALE',fav=isFav(p.id)?'❤️':'🤍',tags=[];if(p.size)tags.push(`📐 ${p.size} sqft`);if(p.bedroom)tags.push(`🛏 ${p.bedroom} bed`);if(p.bathroom)tags.push(`🚿 ${p.bathroom} bath`);if(p.parking)tags.push(`🚗 ${p.parking} park`);if(p.renovate)tags.push(`🛠 ${p.renovate} reno`);if(p.furnish)tags.push(`🪑 ${p.furnish} furnish`);if(p.tenure)tags.push(`📜 ${p.tenure}`);return `<div class="card ${isGold?'gold-card':''}" data-id="${p.id}"><div class="img-box">${p.exclusive?'<div class="badge">⭐ EXCLUSIVE</div>':''}<div class="tag ${tag}">${tagLabel}</div><img id="img${p.id}" src="${img}" loading="lazy" onerror="this.src='https://placehold.co/600x400/f5f5f7/86868b?text=Error'">${showNav?`<button class="nav prev" onclick="event.stopPropagation();changeImage(${p.id},-1)">‹</button><button class="nav next" onclick="event.stopPropagation();changeImage(${p.id},1)">›</button>`:''}<div class="image-counter">${idx+1}/${total}</div></div><div class="content"><h3>${p.title}</h3><div class="price">${p.price}</div><div class="info">📍 ${p.area}</div><div class="detail-tags">${tags.map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div></div><div class="card-buttons"><a class="btn" href="${buildWALink(p)}" target="_blank" onclick="event.stopPropagation()">WhatsApp</a><button class="btn-outline" onclick="event.stopPropagation();openDetail(${p.id})">View Details</button><button class="btn-fav" data-id="${p.id}" onclick="event.stopPropagation();toggleFavCard(${p.id})">${fav}</button></div></div>`;}
function toggleFavCard(id){let newState=toggleFav(id);let btn=document.querySelector(`.btn-fav[data-id="${id}"]`);if(btn)btn.innerText=newState?'❤️':'🤍';}
window.changeImage=(id,delta)=>{let p=allProperties.find(p=>p.id===id);if(!p||!p.imagesSmall.length)return;let newIdx=(imgIndex[id]||0)+delta;if(newIdx<0)newIdx=p.imagesSmall.length-1;if(newIdx>=p.imagesSmall.length)newIdx=0;imgIndex[id]=newIdx;let imgEl=document.getElementById(`img${id}`);if(imgEl)imgEl.src=p.imagesSmall[newIdx];let counter=imgEl?.parentElement?.querySelector('.image-counter');if(counter)counter.innerText=`${newIdx+1}/${p.imagesSmall.length}`;};
function openDetail(id){let p=allProperties.find(p=>p.id===id);if(!p)return;addRecent(id);currentModalProp=p;currentModalImgIdx=0;updateModal();document.getElementById('detailModal').style.display='flex';document.body.style.overflow='hidden';}
function updateModal(){if(!currentModalProp)return;let imgs=currentModalProp.imagesLarge,img=imgs[currentModalImgIdx]||imgs[0];document.getElementById('modalImage').src=img;document.getElementById('modalCounter').innerText=`${currentModalImgIdx+1}/${imgs.length}`;document.getElementById('modalTitle').innerText=currentModalProp.title;document.getElementById('modalPrice').innerText=currentModalProp.price;document.getElementById('modalArea').innerHTML=`📍 ${currentModalProp.area}`;let tags=[];if(currentModalProp.size)tags.push(`📐 ${currentModalProp.size} sqft`);if(currentModalProp.bedroom)tags.push(`🛏 ${currentModalProp.bedroom} bed`);if(currentModalProp.bathroom)tags.push(`🚿 ${currentModalProp.bathroom} bath`);if(currentModalProp.parking)tags.push(`🚗 ${currentModalProp.parking} park`);if(currentModalProp.renovate)tags.push(`🛠 ${currentModalProp.renovate} reno`);if(currentModalProp.furnish)tags.push(`🪑 ${currentModalProp.furnish} furnish`);if(currentModalProp.tenure)tags.push(`📜 ${currentModalProp.tenure}`);document.getElementById('modalTags').innerHTML=tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');document.getElementById('modalWALink').href=buildWALink(currentModalProp);}
function closeModal(){document.getElementById('detailModal').style.display='none';document.body.style.overflow='';}
function nextModal(){if(currentModalProp&&currentModalImgIdx+1<currentModalProp.imagesLarge.length){currentModalImgIdx++;updateModal();}}
function prevModal(){if(currentModalProp&&currentModalImgIdx-1>=0){currentModalImgIdx--;updateModal();}}
function renderPagination(total){let div=document.getElementById('pagination');if(total<=1){div.innerHTML='';return;}let html=`<button class="prev-page" ${currentPage===1?'disabled':''}>‹ Previous</button><div class="page-numbers">`;let start=Math.max(1,currentPage-2),end=Math.min(total,currentPage+2);if(start>1){html+=`<span data-page="1">1</span>`;if(start>2)html+=`<span>...</span>`;}for(let i=start;i<=end;i++)html+=`<span data-page="${i}" class="${i===currentPage?'active':''}">${i}</span>`;if(end<total){if(end<total-1)html+=`<span>...</span>`;html+=`<span data-page="${total}">${total}</span>`;}html+=`</div><button class="next-page" ${currentPage===total?'disabled':''}>Next ›</button><div class="page-jump">Go to <input type="number" id="pageJump" min="1" max="${total}" placeholder="${currentPage}"> <button id="jumpBtn">Go</button></div>`;div.innerHTML=html;div.querySelectorAll('.page-numbers span[data-page]').forEach(s=>s.addEventListener('click',()=>{let page=parseInt(s.dataset.page);if(!isNaN(page)&&page!==currentPage){currentPage=page;renderNormal();document.getElementById('grid').scrollIntoView({behavior:'smooth',block:'start'});}}));let prevBtn=div.querySelector('.prev-page'),nextBtn=div.querySelector('.next-page');if(prevBtn&&!prevBtn.disabled)prevBtn.addEventListener('click',()=>{if(currentPage>1){currentPage--;renderNormal();document.getElementById('grid').scrollIntoView({behavior:'smooth',block:'start'});}});if(nextBtn&&!nextBtn.disabled)nextBtn.addEventListener('click',()=>{if(currentPage<total){currentPage++;renderNormal();document.getElementById('grid').scrollIntoView({behavior:'smooth',block:'start'});}});let jumpInput=document.getElementById('pageJump'),jumpBtn=document.getElementById('jumpBtn');if(jumpBtn)jumpBtn.addEventListener('click',()=>{let page=parseInt(jumpInput.value);if(isNaN(page))page=currentPage;page=Math.min(total,Math.max(1,page));if(page!==currentPage){currentPage=page;renderNormal();document.getElementById('grid').scrollIntoView({behavior:'smooth',block:'start'});}});}
function showFavModal(){let ids=getFav(),cont=document.getElementById('favoritesList');if(!ids.length){cont.innerHTML='<div style="text-align:center;padding:20px;">No favorites yet. Click the heart on any property.</div>';}else{cont.innerHTML=ids.map(id=>{let p=allProperties.find(p=>p.id===id);return p?`<div class="favorite-item" data-id="${id}"><img src="${p.imagesSmall[0]}" loading="lazy"><div class="info"><div class="title">${p.title}</div><div class="price">${p.price}</div><div>📍 ${p.area}</div></div><button class="remove-fav" data-id="${id}">🗑️</button></div>`:''}).join('');cont.querySelectorAll('.favorite-item').forEach(item=>{let id=parseInt(item.dataset.id);item.addEventListener('click',e=>{if(e.target.classList.contains('remove-fav'))return;openDetail(id);closeFavModal();});});cont.querySelectorAll('.remove-fav').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();let id=parseInt(btn.dataset.id);toggleFav(id);showFavModal();}));}document.getElementById('favoritesModal').style.display='flex';document.body.style.overflow='hidden';}
function closeFavModal(){document.getElementById('favoritesModal').style.display='none';document.body.style.overflow='';}
function showHistoryModal(){let ids=getRecent(),cont=document.getElementById('historyList');if(!ids.length){cont.innerHTML='<div style="text-align:center;padding:20px;">No recently viewed properties.</div>';}else{cont.innerHTML=ids.map(id=>{let p=allProperties.find(p=>p.id===id);return p?`<div class="history-item" data-id="${id}"><img src="${p.imagesSmall[0]}" loading="lazy"><div class="info"><div class="title">${p.title}</div><div class="price">${p.price}</div><div>📍 ${p.area}</div></div></div>`:''}).join('');cont.querySelectorAll('.history-item').forEach(item=>{let id=parseInt(item.dataset.id);item.addEventListener('click',()=>{openDetail(id);closeHistoryModal();});});}document.getElementById('historyModal').style.display='flex';document.body.style.overflow='hidden';}
function closeHistoryModal(){document.getElementById('historyModal').style.display='none';document.body.style.overflow='';}
function initTouch(){let startX=0,endX=0;document.querySelectorAll('.img-box').forEach(box=>{box.addEventListener('touchstart',e=>startX=e.changedTouches[0].screenX);box.addEventListener('touchend',e=>{endX=e.changedTouches[0].screenX;let card=box.closest('.card');if(card&&card.dataset.id){let id=parseInt(card.dataset.id);if(endX<startX-30)changeImage(id,1);if(endX>startX+30)changeImage(id,-1);}});});let modalBox=document.querySelector('.modal-img-box');if(modalBox){let mStart=0,mEnd=0;modalBox.addEventListener('touchstart',e=>mStart=e.changedTouches[0].screenX);modalBox.addEventListener('touchend',e=>{mEnd=e.changedTouches[0].screenX;if(mEnd<mStart-30)nextModal();if(mEnd>mStart+30)prevModal();});}}
function checkScrollGradient(){let scrollDiv=document.getElementById('exclusiveScroll'),gradient=document.getElementById('scrollGradient');if(!scrollDiv||!gradient)return;let hasScroll=scrollDiv.scrollWidth>scrollDiv.clientWidth;gradient.style.display=hasScroll?'block':'none';scrollDiv.addEventListener('scroll',()=>{gradient.style.opacity=scrollDiv.scrollLeft+scrollDiv.clientWidth>=scrollDiv.scrollWidth-5?'0':'1';});}
function onFilterChange(){currentPage=1;saveFilters();renderExclusive();renderNormal();setTimeout(initTouch,100);checkScrollGradient();}
// 事件绑定
document.querySelectorAll('#type, #area, #sort, #search').forEach(el=>el.addEventListener('input',onFilterChange));
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalPrev').addEventListener('click',prevModal);
document.getElementById('modalNext').addEventListener('click',nextModal);
window.addEventListener('click',e=>{if(e.target===document.getElementById('detailModal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('favoritesIcon').addEventListener('click',showFavModal);
document.getElementById('historyIcon').addEventListener('click',showHistoryModal);
document.getElementById('closeFavorites').addEventListener('click',closeFavModal);
document.getElementById('closeHistory').addEventListener('click',closeHistoryModal);
window.addEventListener('click',e=>{if(e.target===document.getElementById('favoritesModal'))closeFavModal();if(e.target===document.getElementById('historyModal'))closeHistoryModal();});
loadData().then(()=>{initTouch();checkScrollGradient();});
</script>
