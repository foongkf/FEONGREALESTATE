<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEONG REAL ESTATE PENANG</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#000;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

header{
  position:sticky;
  top:0;
  z-index:1000;
  text-align:center;
  padding:20px 16px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  transition:.25s;
}
header.shrink{
  padding:10px 16px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
header h1{
  margin:0;
  font-size:24px;
  letter-spacing:2px;
  text-transform:uppercase;
}
header p{
  margin:4px 0 0;
  font-size:13px;
  opacity:.7;
  transition:.2s;
}
header.shrink p{opacity:0;height:0;margin:0;}

.container{max-width:1200px;margin:auto;padding:16px;}

.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
select,input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.exclusive-title{
  display:inline-block;
  font-size:13px;
  padding:6px 10px;
  border:1px solid rgba(0,0,0,.15);
  border-radius:10px;
  background:rgba(255,255,255,.6);
  margin-bottom:10px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
}
.gold{background:linear-gradient(135deg,#fff7ed,#fde68a);border:2px solid #f59e0b;}

.img{position:relative;height:180px;}
.img img{width:100%;height:100%;object-fit:cover;}

.nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.4);color:#fff;border:0;
  padding:6px 10px;cursor:pointer;
}
.prev{left:8px}.next{right:8px}

.badge{position:absolute;top:10px;left:10px;background:#f59e0b;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px}
.tag{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:12px;color:#fff;font-weight:bold}
.tag.sale{background:#ef4444}.tag.rent{background:#3b82f6}

.content{padding:12px}
.price{color:#16a34a;font-weight:bold;font-size:18px;margin:6px 0}
.info{font-size:13px;color:#444;margin:4px 0}
.btn{display:block;text-align:center;background:#25D366;color:#fff;padding:10px;border-radius:8px;text-decoration:none;margin-top:10px}

footer{
  text-align:center;
  padding:14px;
  margin-top:20px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,.08);
  font-size:13px;
}
</style>
</head>
<body>
<header>
  <h1>FEONG REAL ESTATE PENANG</h1>
  <p>Penang Property Listing</p>
</header>

<div class="container">
  <div class="filters">
    <select id="type"><option value="all">All</option><option value="sale">Sale</option><option value="rent">Rent</option></select>
    <select id="area"><option value="all">Area</option></select>
    <select id="sort"><option>Default</option><option value="exclusive">Exclusive First</option><option value="low">Low→High</option><option value="high">High→Low</option></select>
    <input id="search" placeholder="Search..." />
  </div>

  <div class="exclusive-title">⭐ Exclusive Listings</div>
  <div class="grid" id="exclusive"></div>

  <div class="grid" id="list"></div>
</div>

<footer>FEONG | 014-7405020 | REN 61687</footer>

<script>
const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";

// DOM FIX (CRITICAL)
const typeFilter=document.getElementById("type");
const search=document.getElementById("search");
const area=document.getElementById("area");
const exclusiveEl=document.getElementById("exclusive");
const listEl=document.getElementById("list");

let data=[],img={};

const clean=v=>(v||"").replace(/\r/g,"").replace(/^"|"$/g,"").trim();
const isEx=p=>(p.exclusive||"").toLowerCase()==="yes";
const type=p=>(p.type||"").includes("rent")?"rent":"sale";

function parseImg(r){
  return (r||"").split("|").filter(Boolean).map(u=>{
    const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/);
    return m?"https://drive.google.com/thumbnail?id="+m[1]:u;
  });
}

function wa(p){
  return `https://wa.me/60147405020?text=${encodeURIComponent(`Hi, interested in ${p.title}\n${p.area}\n${p.price}`)}`;
}

async function load(){
  try{
    const t=await (await fetch(URL)).text();
    const rows=t.split("\n").slice(1).filter(Boolean);

    data=rows.map((r,i)=>{
      let c=r.split(",");
      if(c.length>13){
        const p=c.slice(10,c.length-2).join(",");
        c=[...c.slice(0,10),p,c[c.length-2],c[c.length-1]];
      }
      return{
        id:i,
        title:clean(c[0]),area:clean(c[1]),size:clean(c[2]),bedroom:clean(c[3]),bathroom:clean(c[4]),
        renovate:clean(c[5]),furnish:clean(c[6]),parking:clean(c[7]),tenure:clean(c[8]),type:clean(c[9]),
        price:clean(c[10]),exclusive:clean(c[11]),images:parseImg(clean(c[12]))
      };
    }).filter(p=>p.title);

    render();
  }catch(e){
    console.error("CSV LOAD ERROR:",e);
  }
}

function render(){
  const t=typeFilter.value||"all";
  const s=(search.value||"").toLowerCase();
  const a=area.value||"all";

  const filtered=data.filter(p=>
    (t=="all"||p.type.includes(t))&&
    (a=="all"||p.area==a)&&
    (!s||p.title.toLowerCase().includes(s))
  );

  const ex=filtered.filter(isEx);
  const normal=filtered.filter(p=>!isEx(p));

  exclusiveEl.innerHTML=ex.map(card).join("");
  listEl.innerHTML=normal.map(card).join("");
}

function card(p){
  img[p.id]=img[p.id]||0;
  const i=p.images[img[p.id]]||"https://via.placeholder.com/400";
  const t=type(p);

  return `<div class="card ${isEx(p)?'gold':''}">
    <div class="img">
      ${isEx(p)?'<div class="badge">EXCLUSIVE</div>':''}
      <div class="tag ${t}">${t.toUpperCase()}</div>
      <img id="i${p.id}" src="${i}" />
      <button class="nav prev" onclick="chg(${p.id},-1)">‹</button>
      <button class="nav next" onclick="chg(${p.id},1)">›</button>
    </div>
    <div class="content">
      <h3>${p.title}</h3>
      <div class="price">${p.price}</div>
      <div class="info">📍 ${p.area}</div>
      <div class="info">${p.size} sqft | 🛏 ${p.bedroom} | 🚿 ${p.bathroom}</div>
      <a class="btn" href="${wa(p)}" target="_blank">WhatsApp</a>
    </div>
  </div>`;
}

function chg(id,d){
  const p=data.find(x=>x.id==id);
  if(!p||!p.images.length)return;
  img[id]=(img[id]+d+p.images.length)%p.images.length;
  document.getElementById("i"+id).src=p.images[img[id]];
}

load();

// safe binding
window.addEventListener("load",()=>{
  typeFilter.oninput=render;
  search.oninput=render;
  area.oninput=render;
});
</script>
</body>
</html>
