<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"/>
  <title>Feong Real Estate — Penang</title>
  <style>
    /* ---------- CSS 变量 ---------- */
    :root {
      --card-min-height: 380px;
      --card-min-height-mobile: 360px;
      --tag-bg: #f5f5f7;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 16px 28px rgba(0, 0, 0, 0.1);
      --border-light: #e8e8ed;
      --text-dark: #1d1d1f;
      --text-muted: #6e6e73;
      --brand-blue: #0071e3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f0f2;
      color: var(--text-dark);
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* 城市幻灯片背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -2;
      background-size: cover;
      background-position: center;
      animation: bgSlide 25s infinite;
      filter: grayscale(15%) brightness(1.05);
    }
    @keyframes bgSlide {
      0%   { background-image: url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1200&q=80'); }
      25%  { background-image: url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1200&q=80'); }
      50%  { background-image: url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1200&q=80'); }
      75%  { background-image: url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=1200&q=80'); }
      100% { background-image: url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1200&q=80'); }
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.4);
      z-index: -1;
    }

    /* 骨架屏 */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .skeleton-card {
      background: rgba(255,255,255,0.6);
      border-radius: 18px;
      height: 380px;
      animation: pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* 顶部品牌 + 功能图标 */
    .top-bar {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 1000;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .floating-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      padding: 8px 18px;
      border-radius: 40px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      border: 0.5px solid rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
      cursor: default;
    }
    .floating-brand:hover {
      background: white;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }
    .logo { font-size: 22px; opacity: 0.8; }
    .brand-text .name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.2px;
      color: var(--text-dark);
    }
    .brand-text .sub {
      font-size: 10px;
      color: var(--text-muted);
    }
    .icon-btn {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border: 0.5px solid rgba(0, 0, 0, 0.05);
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
    }
    .icon-btn:hover {
      background: white;
      transform: scale(0.96);
    }

    /* 筛选栏 */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
      margin-top: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      padding: 16px 24px;
      border-radius: 60px;
      border: 0.5px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    }
    select, input {
      background: #ffffff;
      border: 1px solid #d2d2d7;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-dark);
      outline: none;
      transition: all 0.2s;
      cursor: pointer;
    }
    select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2386868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }
    input {
      flex: 1;
      min-width: 180px;
      background-image: none;
    }
    select:focus, input:focus {
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
    }

    /* 独占区横向滚动 */
    .exclusive-section {
      margin-bottom: 48px;
      position: relative;
    }
    .exclusive-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--text-dark);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      margin-bottom: 20px;
      border: 0.5px solid rgba(0,0,0,0.05);
    }
    .horizontal-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 12px;
      scroll-behavior: smooth;
    }
    .horizontal-scroll::-webkit-scrollbar {
      height: 6px;
    }
    .horizontal-scroll::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
      border-radius: 10px;
    }
    .horizontal-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }
    .scroll-gradient {
      position: absolute;
      right: 0;
      top: 30px;
      bottom: 12px;
      width: 60px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.8));
      pointer-events: none;
      z-index: 2;
      border-radius: 0 20px 20px 0;
    }
    .exclusive-grid {
      display: inline-flex;
      gap: 20px;
      white-space: normal;
      align-items: stretch;
    }
    .exclusive-grid .card {
      width: 280px;
      flex-shrink: 0;
      min-height: var(--card-min-height);
    }

    /* 普通网格 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .no-results {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.7);
      border-radius: 30px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* 卡片样式 */
    .card {
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: var(--shadow-sm);
      border: 0.5px solid var(--border-light);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
    .gold-card {
      background: #fffef7;
      border-left: 3px solid #f5a623;
    }

    .img-box {
      position: relative;
      height: 160px;
      background-color: #f5f5f7;
      overflow: hidden;
      flex-shrink: 0;
    }
    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .card:hover .img-box img {
      transform: scale(1.02);
    }
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: 9px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      z-index: 2;
    }
    .tag {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
      backdrop-filter: blur(4px);
      background: rgba(0,0,0,0.75);
      color: white;
      z-index: 2;
    }
    .tag.sale { background: rgba(230, 60, 60, 0.9); }
    .tag.rent { background: rgba(0, 113, 227, 0.9); }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 3;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .nav:hover { background: white; }
    .prev { left: 8px; }
    .next { right: 8px; }
    .image-counter {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 12px;
      z-index: 2;
    }

    .content {
      padding: 14px 14px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .content h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 6px;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .price {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-dark);
      margin: 6px 0 8px;
    }
    .info {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }
    .detail-tag {
      background: var(--tag-bg);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dark);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      letter-spacing: -0.2px;
    }

    /* 底部按钮组：两个主按钮 flex:1，收藏按钮固定圆形 */
    .card-buttons {
      display: flex;
      gap: 10px;
      margin-top: auto;
      padding: 0 14px 14px 14px;
      align-items: center;
    }
    .btn, .btn-outline {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 12px;
      font-weight: 500;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      font-family: inherit;
      min-width: 0; /* 允许收缩，但 flex:1 会分配空间 */
    }
    .btn {
      background: var(--text-dark);
      color: white;
    }
    .btn:hover {
      background: #000;
      transform: scale(0.97);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #d2d2d7;
      color: var(--text-dark);
    }
    .btn-outline:hover {
      background: #f5f5f7;
      border-color: var(--text-dark);
    }
    /* 圆形收藏按钮 */
    .btn-fav {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid #d2d2d7;
      color: #ff3b30;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      padding: 0;
    }
    .btn-fav:hover {
      background: #f5f5f7;
      transform: scale(0.96);
    }

    /* 分页控件 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .pagination button {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(0,0,0,0.05);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dark);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .pagination button:hover:not(:disabled) {
      background: white;
      transform: scale(0.96);
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-numbers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .page-numbers span {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.1s;
      border: 0.5px solid rgba(0,0,0,0.05);
    }
    .page-numbers span.active {
      background: var(--text-dark);
      color: white;
      border: none;
    }
    .page-numbers span:hover:not(.active) {
      background: white;
    }
    .page-jump {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .page-jump input {
      width: 60px;
      text-align: center;
      padding: 6px;
      border-radius: 30px;
    }

    footer {
      text-align: center;
      padding: 24px 20px;
      margin-top: 40px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-top: 0.5px solid rgba(0,0,0,0.05);
      color: var(--text-muted);
      font-size: 12px;
    }

    /* 模态框 (通用) */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-content {
      max-width: 700px;
      width: 100%;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      animation: modalFadeIn 0.2s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-img-box {
      position: relative;
      height: 320px;
      background: #f5f5f7;
    }
    .modal-img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .modal-nav:hover {
      background: white;
    }
    .modal-prev { left: 16px; }
    .modal-next { right: 16px; }
    .modal-counter {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
      z-index: 10;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: none;
      color: white;
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: 0.2s;
    }
    .modal-close:hover {
      background: rgba(0,0,0,0.8);
    }
    .modal-details {
      padding: 24px;
    }
    .modal-details h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal-price {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      margin: 12px 0 8px;
    }
    .modal-area {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    .modal-tag {
      background: #f5f5f7;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
    }
    .modal-wa-btn {
      display: block;
      background: #25D366;
      color: white;
      text-align: center;
      padding: 14px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 20px;
      transition: 0.2s;
    }
    .modal-wa-btn:hover {
      background: #1ebe5d;
      transform: scale(0.98);
    }

    /* 小型模态框 (收藏夹/历史) */
    .small-modal-content {
      max-width: 500px;
      background: white;
      border-radius: 28px;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .small-modal-content h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .small-modal-content .close-small {
      cursor: pointer;
      font-size: 24px;
    }
    .favorite-list, .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .favorite-item, .history-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px;
      background: #f5f5f7;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.1s;
    }
    .favorite-item:hover, .history-item:hover {
      background: #e8e8ed;
    }
    .favorite-item img, .history-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 12px;
    }
    .favorite-item .info, .history-item .info {
      flex: 1;
    }
    .favorite-item .title, .history-item .title {
      font-weight: 600;
      font-size: 14px;
    }
    .favorite-item .price, .history-item .price {
      font-size: 13px;
      color: var(--text-muted);
    }
    .remove-fav {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ff3b30;
      padding: 4px;
    }

    /* 移动端 */
    @media (max-width: 768px) {
      .container {
        padding: 1.2rem 1rem;
      }
      .filters {
        margin-top: 60px;
        margin-bottom: 24px;
        padding: 12px 18px;
      }
      .exclusive-grid .card {
        width: 260px;
        min-height: var(--card-min-height-mobile);
      }
      .grid {
        gap: 14px;
      }
      .pagination button, .page-numbers span {
        padding: 6px 12px;
        font-size: 12px;
      }
      .detail-tag {
        font-size: 9px;
        padding: 3px 8px;
      }
      .modal-img-box {
        height: 250px;
      }
      .modal-details h2 {
        font-size: 20px;
      }
      .modal-price {
        font-size: 24px;
      }
      .top-bar {
        top: 16px;
        right: 16px;
      }
      .icon-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      .btn-fav {
        width: 28px;
        height: 28px;
        font-size: 14px;
      }
      .card-buttons {
        gap: 8px;
      }
      .btn, .btn-outline {
        padding: 6px 0;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="floating-brand">
    <div class="logo">🏙️</div>
    <div class="brand-text">
      <div class="name">FEONG REAL ESTATE</div>
      <div class="sub">Penang Property Listing</div>
    </div>
  </div>

<script>
// ======================= 工具函数 =======================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// 价格格式化
function formatPrice(priceRaw) {
  if (!priceRaw) return '';
  let numStr = priceRaw.toString().replace(/[^0-9]/g, '');
  if (numStr === '') return '';
  let num = parseInt(numStr, 10);
  if (isNaN(num)) return priceRaw;
  let formatted = num.toLocaleString('en-US');
  return `RM ${formatted}`;
}

function getPriceNumber(priceStr) {
  if (!priceStr) return 0;
  const num = parseFloat(priceStr.toString().replace(/[^0-9]/g, ''));
  return isNaN(num) ? 0 : num;
}

// Google Drive 图片
function formatImgUrl(url, size = 'small') {
  if (!url) return '';
  if (url.includes('drive.google.com')) {
    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (match && match[1]) {
      const sz = size === 'small' ? 'w400' : 'w1200';
      return `https://drive.google.com/thumbnail?id=${match[1]}&sz=${sz}`;
    }
    const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (idMatch) {
      const sz = size === 'small' ? 'w400' : 'w1200';
      return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=${sz}`;
    }
  }
  return url;
}

function parseImages(raw, size = 'small') {
  if (!raw) return ['https://placehold.co/600x400/f5f5f7/86868b?text=No+Image'];
  return raw.split('|').map(s => s.trim()).filter(Boolean).map(url => formatImgUrl(url, size));
}

// WhatsApp 消息自动带图片
function buildWALink(property) {
  const imageUrl = property.imagesSmall && property.imagesSmall[0] ? property.imagesSmall[0] : '';
  const msg = `Hi, I’m interested in this property:\n🏠 ${property.title}\n📍 ${property.area}\n💰 ${property.price}\n📐 ${property.size} sqft\n🛏 ${property.bedroom} bed\n🚿 ${property.bathroom} bath\n🚗 ${property.parking} park\n🛠 ${property.renovate} reno\n🪑 ${property.furnish} furnish\n📜 ${property.tenure}\n\n📸 Image: ${imageUrl}\n\nPlease give me more details.`;
  return `https://wa.me/60147405020?text=${encodeURIComponent(msg)}`;
}

// ======================= localStorage 操作 =======================
// 收藏
function getFavorites() {
  return JSON.parse(localStorage.getItem('favorites') || '[]');
}
function saveFavorites(favorites) {
  localStorage.setItem('favorites', JSON.stringify(favorites));
}
function toggleFavorite(propertyId) {
  let favs = getFavorites();
  if (favs.includes(propertyId)) {
    favs = favs.filter(id => id !== propertyId);
  } else {
    favs.push(propertyId);
  }
  saveFavorites(favs);
  return favs.includes(propertyId);
}
function isFavorite(propertyId) {
  return getFavorites().includes(propertyId);
}

// 最近浏览 (最多10条，去重，最新的在前)
function getRecentViews() {
  return JSON.parse(localStorage.getItem('recentViews') || '[]');
}
function addRecentView(propertyId) {
  let recents = getRecentViews();
  recents = recents.filter(id => id !== propertyId);
  recents.unshift(propertyId);

}

// ======================= 数据加载与渲染 =======================
let allProperties = [];
let imgIndex = {};
let currentPage = 1;
const ITEMS_PER_PAGE = 12;
let currentModalProperty = null;
let currentModalImageIndex = 0;

function parseCSVRow(line, expectedCols = 13) {
  const result = [];
  let inQuote = false;
  let current = '';
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  if (result.length > expectedCols) {
    let pricePart = result.slice(10, result.length - 2).join(',');
    let newRow = [...result.slice(0,10), pricePart, ...result.slice(-2)];
    return newRow;
  }
  while(result.length < expectedCols) result.push('');
  return result;
}

function buildPropertiesFromCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const properties = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVRow(lines[i], 13);
    if (cols.length < 10 || !cols[0]) continue;
    const rawPrice = cols[10] || '';
    const formattedPrice = formatPrice(rawPrice);
    const priceNum = getPriceNumber(rawPrice);
    const prop = {
      id: i,
      title: escapeHtml(cols[0] || ''),
      area: escapeHtml(cols[1] || ''),
      size: escapeHtml(cols[2] || ''),
      bedroom: escapeHtml(cols[3] || ''),
      bathroom: escapeHtml(cols[4] || ''),
      renovate: escapeHtml(cols[5] || ''),
      furnish: escapeHtml(cols[6] || ''),
      parking: escapeHtml(cols[7] || ''),
      tenure: escapeHtml(cols[8] || '').toLowerCase(),
      type: (cols[9] || '').toLowerCase(),
      price: formattedPrice,
      priceNum: priceNum,
      exclusive: (cols[11] || '').toLowerCase() === 'yes',
      imagesRaw: cols[12] || ''
    };
    prop.imagesSmall = parseImages(prop.imagesRaw, 'small');
    prop.imagesLarge = parseImages(prop.imagesRaw, 'large');
    properties.push(prop);
  }
  return properties;
}

async function loadData() {
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwWRAXHV6rHGwMwJRt3u0DZ9n3SXfWbbmbJcRjzcFfTEjAGMapqPer8ajYk7lOKNCCSzbJWwuMylS1/pub?output=csv";
  showSkeleton();
  try {
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const csvText = await resp.text();
    const properties = buildPropertiesFromCSV(csvText);
    if (properties.length === 0) throw new Error("No valid rows");
    allProperties = properties;
  } catch (err) {
    console.warn("Using sample data", err);
    allProperties = getSampleProperties();
  }
  allProperties.forEach(p => { imgIndex[p.id] = 0; });
  populateAreaFilter();
  loadFilters();            // 恢复筛选条件
  currentPage = 1;
  renderExclusive();
  renderNormalPaged();
  checkScrollGradient();
}

function showSkeleton() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="skeleton-grid">' + Array(6).fill('<div class="skeleton-card"></div>').join('') + '</div>';
}

function populateAreaFilter() {
  const areas = [...new Set(allProperties.map(p => p.area).filter(a => a))];
  const areaSelect = document.getElementById('area');
  areaSelect.innerHTML = '<option value="all">Area</option>' + areas.map(a => `<option value="${a}">${a}</option>`).join('');
}

function getFilteredNormalProps() {
  const typeVal = document.getElementById('type').value;
  const areaVal = document.getElementById('area').value;
  const searchVal = document.getElementById('search').value.trim().toLowerCase();
  const sortVal = document.getElementById('sort').value;

  let filtered = allProperties.filter(p => {
    if (typeVal !== 'all' && !p.type.includes(typeVal)) return false;
    if (areaVal !== 'all' && p.area !== areaVal) return false;
    if (searchVal && !p.title.toLowerCase().includes(searchVal)) return false;
    return true;
  });
  let normalProps = filtered.filter(p => !p.exclusive);
  const applySort = (list) => {
    if (sortVal === 'low') return [...list].sort((a,b) => a.priceNum - b.priceNum);
    if (sortVal === 'high') return [...list].sort((a,b) => b.priceNum - a.priceNum);
    return list;
  };
  normalProps = applySort(normalProps);
  return normalProps;
}

function getFilteredExclusiveProps() {
  const typeVal = document.getElementById('type').value;
  const areaVal = document.getElementById('area').value;
  const searchVal = document.getElementById('search').value.trim().toLowerCase();
  const sortVal = document.getElementById('sort').value;

  let filtered = allProperties.filter(p => {
    if (typeVal !== 'all' && !p.type.includes(typeVal)) return false;
    if (areaVal !== 'all' && p.area !== areaVal) return false;
    if (searchVal && !p.title.toLowerCase().includes(searchVal)) return false;
    return true;
  });
  let exclusiveProps = filtered.filter(p => p.exclusive);
  const applySort = (list) => {
    if (sortVal === 'low') return [...list].sort((a,b) => a.priceNum - b.priceNum);
    if (sortVal === 'high') return [...list].sort((a,b) => b.priceNum - a.priceNum);
    return list;
  };
  exclusiveProps = applySort(exclusiveProps);
  return exclusiveProps;
}

function renderExclusive() {
  const exclusiveProps = getFilteredExclusiveProps();
  const container = document.getElementById('exclusiveGrid');
  if (exclusiveProps.length === 0) {
    container.innerHTML = '<div class="no-results" style="width: 100%; text-align: center;">No exclusive listings found</div>';
  } else {
    container.innerHTML = exclusiveProps.map(p => renderCard(p, true)).join('');
  }
  document.querySelectorAll('.card img').forEach(img => img.setAttribute('loading', 'lazy'));
}

function renderNormalPaged() {
  const normalProps = getFilteredNormalProps();
  const totalPages = Math.ceil(normalProps.length / ITEMS_PER_PAGE);
  if (totalPages > 0 && currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = normalProps.slice(start, start + ITEMS_PER_PAGE);
  const grid = document.getElementById('grid');
  if (pageItems.length === 0 && normalProps.length === 0) {
    grid.innerHTML = '<div class="no-results">🏠 No properties match your criteria.<br>Try adjusting filters.</div>';
  } else {
    grid.innerHTML = pageItems.map(p => renderCard(p, false)).join('');
  }
  renderPaginationControls(totalPages);
  document.querySelectorAll('.card img').forEach(img => img.setAttribute('loading', 'lazy'));
}

function renderCard(p, isGold) {
  const images = p.imagesSmall;
  const currentIdx = imgIndex[p.id] || 0;
  const currentImg = images[currentIdx] || images[0];
  const totalImgs = images.length;
  const showNav = totalImgs > 1;
  const typeTag = p.type.includes('rent') ? 'rent' : 'sale';
  const tagLabel = typeTag === 'rent' ? 'RENT' : 'SALE';
  const fav = isFavorite(p.id) ? '❤️' : '🤍';
  
  const tags = [];
  if (p.size) tags.push(`📐 ${p.size} sqft`);
  if (p.bedroom) tags.push(`🛏 ${p.bedroom} bed`);
  if (p.bathroom) tags.push(`🚿 ${p.bathroom} bath`);
  if (p.parking) tags.push(`🚗 ${p.parking} park`);
  if (p.renovate) tags.push(`🛠 ${p.renovate} reno`);
  if (p.furnish) tags.push(`🪑 ${p.furnish} furnish`);
  if (p.tenure) tags.push(`📜 ${p.tenure}`);
  const tagsHtml = tags.map(t => `<span class="detail-tag">${t}</span>`).join('');

  return `
    <div class="card ${p.exclusive ? 'gold-card' : ''}" data-id="${p.id}">
      <div class="img-box" data-id="${p.id}">
        ${p.exclusive ? '<div class="badge">⭐ EXCLUSIVE</div>' : ''}
        <div class="tag ${typeTag}">${tagLabel}</div>
        <img id="img${p.id}" src="${currentImg}" alt="${p.title}" loading="lazy" onerror="this.src='https://placehold.co/600x400/f5f5f7/86868b?text=Error'">
        ${showNav ? `<button class="nav prev" onclick="event.stopPropagation(); changeImage(${p.id}, -1)">‹</button>
                      <button class="nav next" onclick="event.stopPropagation(); changeImage(${p.id}, 1)">›</button>` : ''}
        <div class="image-counter">${currentIdx+1}/${totalImgs}</div>
      </div>
      <div class="content">
        <h3>${p.title}</h3>
        <div class="price">${p.price}</div>
        <div class="info">📍 ${p.area}</div>
        <div class="detail-tags">${tagsHtml}</div>
      </div>
      <div class="card-buttons">
        <a class="btn" href="${buildWALink(p)}" target="_blank" onclick="event.stopPropagation();">WhatsApp</a>
        <button class="btn-outline" onclick="event.stopPropagation(); openDetailModal(${p.id})">View Details</button>
        <button class="btn-fav" data-id="${p.id}" onclick="event.stopPropagation(); toggleFavoriteCard(${p.id})">${fav}</button>
      </div>
    </div>
  `;
}

function toggleFavoriteCard(propertyId) {
  const newState = toggleFavorite(propertyId);
  const btn = document.querySelector(`.btn-fav[data-id="${propertyId}"]`);
  if (btn) btn.innerText = newState ? '❤️' : '🤍';
}

window.changeImage = function(propId, delta) {
  const prop = allProperties.find(p => p.id === propId);
  if (!prop || !prop.imagesSmall.length) return;
  let newIdx = (imgIndex[propId] || 0) + delta;
  if (newIdx < 0) newIdx = prop.imagesSmall.length - 1;
  if (newIdx >= prop.imagesSmall.length) newIdx = 0;
  imgIndex[propId] = newIdx;
  const imgElem = document.getElementById(`img${propId}`);
  if (imgElem) imgElem.src = prop.imagesSmall[newIdx];
  const counterDiv = imgElem?.parentElement?.querySelector('.image-counter');
  if (counterDiv) counterDiv.innerText = `${newIdx+1}/${prop.imagesSmall.length}`;
};

function openDetailModal(propertyId) {
  const prop = allProperties.find(p => p.id === propertyId);
  if (!prop) return;
  addRecentView(propertyId);   // 记录浏览历史
  currentModalProperty = prop;
  currentModalImageIndex = 0;
  updateModalContent();
  document.getElementById('detailModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function updateModalContent() {
  if (!currentModalProperty) return;
  const images = currentModalProperty.imagesLarge;
  const currentImg = images[currentModalImageIndex] || images[0];
  document.getElementById('modalImage').src = currentImg;
  document.getElementById('modalCounter').innerText = `${currentModalImageIndex+1}/${images.length}`;
  document.getElementById('modalTitle').innerText = currentModalProperty.title;
  document.getElementById('modalPrice').innerText = currentModalProperty.price;
  document.getElementById('modalArea').innerHTML = `📍 ${currentModalProperty.area}`;
  
  const tags = [];
  if (currentModalProperty.size) tags.push(`📐 ${currentModalProperty.size} sqft`);
  if (currentModalProperty.bedroom) tags.push(`🛏 ${currentModalProperty.bedroom} bed`);
  if (currentModalProperty.bathroom) tags.push(`🚿 ${currentModalProperty.bathroom} bath`);
  if (currentModalProperty.parking) tags.push(`🚗 ${currentModalProperty.parking} park`);
  if (currentModalProperty.renovate) tags.push(`🛠 ${currentModalProperty.renovate} reno`);
  if (currentModalProperty.furnish) tags.push(`🪑 ${currentModalProperty.furnish} furnish`);
  if (currentModalProperty.tenure) tags.push(`📜 ${currentModalProperty.tenure}`);
  document.getElementById('modalTags').innerHTML = tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
  
  const waLink = buildWALink(currentModalProperty);
  document.getElementById('modalWALink').href = waLink;
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
  document.body.style.overflow = '';
}

function nextModalImage() {
  if (!currentModalProperty) return;
  if (currentModalImageIndex + 1 < currentModalProperty.imagesLarge.length) {
    currentModalImageIndex++;
    updateModalContent();
  }
}
function prevModalImage() {
  if (!currentModalProperty) return;
  if (currentModalImageIndex - 1 >= 0) {
    currentModalImageIndex--;
    updateModalContent();
  }
}

// 分页
function renderPaginationControls(totalPages) {
  const paginationDiv = document.getElementById('pagination');
  if (totalPages <= 1) {
    paginationDiv.innerHTML = '';
    return;
  }
  let html = `<button class="prev-page" ${currentPage === 1 ? 'disabled' : ''}>‹ Previous</button>`;
  html += `<div class="page-numbers">`;
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);
  if (startPage > 1) {
    html += `<span data-page="1">1</span>`;
    if (startPage > 2) html += `<span>...</span>`;
  }
  for (let i = startPage; i <= endPage; i++) {
    html += `<span data-page="${i}" class="${i === currentPage ? 'active' : ''}">${i}</span>`;
  }
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span>...</span>`;
    html += `<span data-page="${totalPages}">${totalPages}</span>`;
  }
  html += `</div><button class="next-page" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
  html += `<div class="page-jump">Go to <input type="number" id="pageJump" min="1" max="${totalPages}" placeholder="${currentPage}"> <button id="jumpBtn">Go</button></div>`;
  paginationDiv.innerHTML = html;

  paginationDiv.querySelectorAll('.page-numbers span[data-page]').forEach(span => {
    span.addEventListener('click', () => {
      const page = parseInt(span.dataset.page);
      if (!isNaN(page) && page !== currentPage) {
        currentPage = page;
        renderNormalPaged();
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
  const prevBtn = paginationDiv.querySelector('.prev-page');
  const nextBtn = paginationDiv.querySelector('.next-page');
  if (prevBtn && !prevBtn.disabled) prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderNormalPaged(); document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' }); } });
  if (nextBtn && !nextBtn.disabled) nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderNormalPaged(); document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' }); } });
  
  const jumpInput = document.getElementById('pageJump');
  const jumpBtn = document.getElementById('jumpBtn');
  if (jumpBtn) {
    jumpBtn.addEventListener('click', () => {
      let page = parseInt(jumpInput.value);
      if (isNaN(page)) page = currentPage;
      page = Math.min(totalPages, Math.max(1, page));
      if (page !== currentPage) {
        currentPage = page;
        renderNormalPaged();
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }
}

// 收藏夹和历史模态框
function showFavoritesModal() {
  const favIds = getFavorites();
  const container = document.getElementById('favoritesList');
  if (favIds.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:20px;">No favorites yet. Click the heart on any property.</div>';
  } else {
    const items = favIds.map(id => {
      const prop = allProperties.find(p => p.id === id);
      if (!prop) return '';
      return `
        <div class="favorite-item" data-id="${id}">
          <img src="${prop.imagesSmall[0]}" alt="${prop.title}" loading="lazy">
          <div class="info">
            <div class="title">${prop.title}</div>
            <div class="price">${prop.price}</div>
            <div class="info">📍 ${prop.area}</div>
          </div>
          <button class="remove-fav" data-id="${id}">🗑️</button>
        </div>
      `;
    }).join('');
    container.innerHTML = items;
    // 绑定点击事件
    container.querySelectorAll('.favorite-item').forEach(item => {
      const id = parseInt(item.dataset.id);
      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-fav')) return;
        openDetailModal(id);
        closeFavoritesModal();
      });
    });
    container.querySelectorAll('.remove-fav').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        toggleFavorite(id);
        showFavoritesModal(); // 刷新
      });
    });
  }
  document.getElementById('favoritesModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeFavoritesModal() {
  document.getElementById('favoritesModal').style.display = 'none';
  document.body.style.overflow = '';
}
function showHistoryModal() {
  const recentIds = getRecentViews();
  const container = document.getElementById('historyList');
  if (recentIds.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:20px;">No recently viewed properties.</div>';
  } else {
    const items = recentIds.map(id => {
      const prop = allProperties.find(p => p.id === id);
      if (!prop) return '';
      return `
        <div class="history-item" data-id="${id}">
          <img src="${prop.imagesSmall[0]}" alt="${prop.title}" loading="lazy">
          <div class="info">
            <div class="title">${prop.title}</div>
            <div class="price">${prop.price}</div>
            <div class="info">📍 ${prop.area}</div>
          </div>
        </div>
      `;
    }).join('');
    container.innerHTML = items;
    container.querySelectorAll('.history-item').forEach(item => {
      const id = parseInt(item.dataset.id);
      item.addEventListener('click', () => {
        openDetailModal(id);
        closeHistoryModal();
      });
    });
  }
  document.getElementById('historyModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeHistoryModal() {
  document.getElementById('historyModal').style.display = 'none';
  document.body.style.overflow = '';
}

// 触摸滑动
function initTouchSwipe() {
  let touchStartX = 0, touchEndX = 0;
  document.querySelectorAll('.img-box').forEach(box => {
    box.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
    box.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const cardDiv = box.closest('.card');
      if (cardDiv && cardDiv.dataset.id) {
        const propId = parseInt(cardDiv.dataset.id);
        if (touchEndX < touchStartX - 30) changeImage(propId, 1);
        if (touchEndX > touchStartX + 30) changeImage(propId, -1);
      }
    });
  });
  const modalImgBox = document.querySelector('.modal-img-box');
  if (modalImgBox) {
    let modalTouchStart = 0, modalTouchEnd = 0;
    modalImgBox.addEventListener('touchstart', (e) => { modalTouchStart = e.changedTouches[0].screenX; });
    modalImgBox.addEventListener('touchend', (e) => {
      modalTouchEnd = e.changedTouches[0].screenX;
      if (modalTouchEnd < modalTouchStart - 30) nextModalImage();
      if (modalTouchEnd > modalTouchStart + 30) prevModalImage();
    });
  }
}

function checkScrollGradient() {
  const scrollDiv = document.getElementById('exclusiveScroll');
  const gradient = document.getElementById('scrollGradient');
  if (!scrollDiv || !gradient) return;
  const hasScroll = scrollDiv.scrollWidth > scrollDiv.clientWidth;
  gradient.style.display = hasScroll ? 'block' : 'none';
  scrollDiv.addEventListener('scroll', () => {
    if (scrollDiv.scrollLeft + scrollDiv.clientWidth >= scrollDiv.scrollWidth - 5) {
      gradient.style.opacity = '0';
    } else {
      gradient.style.opacity = '1';
    }
  });
}

function onFilterChange() {
  currentPage = 1;
  saveFilters();   // 保存筛选条件
  renderExclusive();
  renderNormalPaged();
  setTimeout(initTouchSwipe, 100);
  checkScrollGradient();
}

// 事件绑定
document.querySelectorAll('#type, #area, #sort, #search').forEach(el => el.addEventListener('input', onFilterChange));
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalPrev').addEventListener('click', prevModalImage);
document.getElementById('modalNext').addEventListener('click', nextModalImage);
window.addEventListener('click', (e) => { if (e.target === document.getElementById('detailModal')) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
document.getElementById('favoritesIcon').addEventListener('click', showFavoritesModal);
document.getElementById('historyIcon').addEventListener('click', showHistoryModal);
document.getElementById('closeFavorites').addEventListener('click', closeFavoritesModal);
document.getElementById('closeHistory').addEventListener('click', closeHistoryModal);
window.addEventListener('click', (e) => {
  if (e.target === document.getElementById('favoritesModal')) closeFavoritesModal();
  if (e.target === document.getElementById('historyModal')) closeHistoryModal();
});

loadData().then(() => {
  initTouchSwipe();
  checkScrollGradient();
});
</script>
